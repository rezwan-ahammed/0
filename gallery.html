<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Janani Coaching Centre | জননী ছাত্র পোর্টাল</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Noto+Serif+Bengali:wght@700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root { --forest: #1a4a3a; --leaf: #52b788; --cream: #f8f5ef; --glass: rgba(255,255,255,0.72); }
    body { font-family: 'Hind Siliguri', sans-serif; background: var(--cream); padding: 15px; }
    .shell { background: var(--glass); backdrop-filter: blur(20px); border-radius: 28px; overflow: hidden; max-width: 480px; margin: auto; border: 1px solid white; box-shadow: 0 30px 60px rgba(0,0,0,0.12); }
    .header { padding: 30px; text-align: center; border-bottom: 1px solid rgba(82,183,136,0.2); }
    .brand { font-family: 'Noto Serif Bengali', serif; font-size: 1.4rem; font-weight: 700; color: var(--forest); }
    .nav { display: flex; border-bottom: 1px solid #e0e0e0; }
    .nav-btn { flex: 1; padding: 15px; border: none; background: none; font-weight: 700; color: #888; cursor: pointer; }
    .nav-btn.on { color: var(--forest); border-bottom: 3px solid var(--leaf); }
    .main { padding: 20px; min-height: 350px; }
    .drop-zone { border: 2px dashed var(--leaf); padding: 40px; border-radius: 20px; text-align: center; position: relative; }
    .drop-zone input { opacity: 0; position: absolute; inset: 0; cursor: pointer; }
    .btn-primary { width: 100%; margin-top: 20px; padding: 16px; background: var(--forest); color: white; border: none; border-radius: 15px; font-weight: 700; font-size: 1rem; cursor: pointer; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
    .modal { background: white; padding: 30px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
    .modal input { width: 100%; padding: 14px; margin: 20px 0; border: 1.5px solid #eee; border-radius: 12px; font-size: 1rem; }
    .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .media-card { aspect-ratio: 1; border-radius: 18px; overflow: hidden; position: relative; background: #eee; border: 1px solid #fff; }
    .media-card img { width: 100%; height: 100%; object-fit: cover; }
    .uploader-badge { position: absolute; top: 8px; left: 8px; background: rgba(255,255,255,0.9); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; color: var(--forest); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useCallback, useRef } = React;
  const API = "https://janani-backend-api.onrender.com/api/v1";

  const App = () => {
    const [tab, setTab] = useState('upload');
    const [queue, setQueue] = useState([]);
    const [loading, setLoading] = useState(false);
    const [items, setItems] = useState([]);
    const [showModal, setShowModal] = useState(false);
    const [studentName, setStudentName] = useState('');
    const [isAdmin, setIsAdmin] = useState(false);
    const [taps, setTaps] = useState(0);

    const fetchMedia = useCallback(async (mode) => {
      setLoading(true);
      try {
        const res = await fetch(`${API}/registry/list?status=${mode}`);
        const data = await res.json();
        setItems(data);
      } catch (e) { console.error(e); }
      setLoading(false);
    }, []);

    const handleUpload = async () => {
      if (!studentName.trim()) return alert("নাম লিখুন");
      setShowModal(false); setLoading(true);
      try {
        for (let file of queue) {
          const fd = new FormData();
          fd.append('file', file); fd.append('studentName', studentName);
          await fetch(`${API}/registry/upload`, { method: 'POST', body: fd });
        }
        setQueue([]); setStudentName(''); alert("✅ জননী পোর্টালে জমা হয়েছে!");
        setTab('gallery');
      } catch (e) { alert("❌ আপলোড ব্যর্থ"); }
      setLoading(false);
    };

    const handleApprove = async (id, name) => {
      try {
        await fetch(`${API}/registry/approve`, {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ id, name })
        });
        fetchMedia('admin');
      } catch (e) { alert("Error"); }
    };

    useEffect(() => {
      if (tab === 'gallery') fetchMedia('public');
      if (tab === 'admin') fetchMedia('admin');
    }, [tab, fetchMedia]);

    return (
      <div className="shell">
        {showModal && (
          <div className="modal-overlay">
            <div className="modal">
              <h3>আপনার নাম লিখুন</h3>
              <input type="text" placeholder="উদা: রেজওয়ান আহমেদ" onChange={(e)=>setStudentName(e.target.value)} />
              <button className="btn-primary" onClick={handleUpload}>আপলোড শুরু করুন</button>
            </div>
          </div>
        )}
        <header className="header" onClick={()=>{const n=taps+1; if(n>=5){setIsAdmin(true);setTab('admin');setTaps(0);}else{setTaps(n)}}}>
          <div className="brand">জননী কোচিং সেন্টার</div>
          <div style={{fontSize:'0.7rem', color:'#666', marginTop:'4px'}}>JANANI STUDENT PORTAL</div>
        </header>
        <nav className="nav">
          <button className={`nav-btn ${tab==='upload'?'on':''}`} onClick={()=>setTab('upload')}>📤 আপলোড</button>
          <button className={`nav-btn ${tab==='gallery'?'on':''}`} onClick={()=>setTab('gallery')}>🖼️ গ্যালারি</button>
          {isAdmin && <button className={`nav-btn ${tab==='admin'?'on':''}`} onClick={()=>setTab('admin')}>⏳ পেন্ডিং</button>}
        </nav>
        <main className="main">
          {tab === 'upload' ? (
            <div>
              <div className="drop-zone">
                <input type="file" multiple onChange={(e)=>setQueue(Array.from(e.target.files))} />
                <span style={{fontSize:'2.5rem'}}>📸</span>
                <div style={{fontWeight:700, marginTop:'10px'}}>ফাইল বেছে নিন</div>
              </div>
              {queue.length > 0 && <button className="btn-primary" onClick={()=>setShowModal(true)}>📤 {queue.length}টি ফাইল জমা দিন</button>}
              {loading && <p style={{textAlign:'center', marginTop:15}}>আপলোড হচ্ছে...</p>}
            </div>
          ) : (
            <div className="gallery-grid">
              {items.map(item => (
                <div key={item.id} className="media-card">
                  <div className="uploader-badge">👤 {item.studentName}</div>
                  <img src={item.src} loading="lazy" />
                  {tab === 'admin' && (
                    <button style={{position:'absolute', bottom:0, width:'100%', background:'green', color:'white', border:'none', padding:5}} onClick={()=>handleApprove(item.id, item.fileName)}>APPROVE</button>
                  )}
                </div>
              ))}
            </div>
          )}
        </main>
      </div>
    );
  };
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
