<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>জানানি কোচিং সেন্টার — ছাত্র পোর্টাল</title>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Noto+Serif+Bengali:wght@700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ... (জানানি পোর্টালের আগের সব স্টাইল এখানে থাকবে) ... */
    
    /* নাম মোডাল স্টাইল */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(26, 74, 58, 0.5);
      backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
    }
    .modal-card {
      background: white; padding: 30px; border-radius: 24px; width: 100%; max-width: 380px; text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    }
    .modal-input {
      width: 100%; padding: 14px; margin: 20px 0; border: 2px solid #eee; border-radius: 12px;
      font-family: inherit; font-size: 1rem; outline: none;
    }
    .modal-input:focus { border-color: #52b788; }

    /* গ্যালারিতে নাম দেখানোর স্টাইল */
    .uploader-badge {
      position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9);
      padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700;
      color: #1a4a3a; z-index: 2; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useCallback, useRef } = React;
  const API = "https://janani-backend-api.onrender.com/api/v1";

  const App = () => {
    const [tab, setTab] = useState('upload');
    const [queue, setQueue] = useState([]);
    const [loading, setLoading] = useState(false);
    const [progress, setProgress] = useState(0);
    const [items, setItems] = useState([]);
    const [isAdmin, setIsAdmin] = useState(false);
    const [toast, setToast] = useState(null);
    const [showModal, setShowModal] = useState(false);
    const [studentName, setStudentName] = useState('');
    const [tapCount, setTapCount] = useState(0);

    const notify = (msg, isErr = false) => {
      setToast({ msg, isErr });
      setTimeout(() => setToast(null), 3500);
    };

    const handleUpload = async () => {
      if (!studentName.trim()) return alert("আপনার নাম লিখুন!");
      setShowModal(false);
      setLoading(true);
      try {
        for (let i = 0; i < queue.length; i++) {
          const fd = new FormData();
          fd.append('file', queue[i]);
          fd.append('studentName', studentName);
          const res = await fetch(`${API}/registry/upload`, { method: 'POST', body: fd });
          if (!res.ok) throw new Error('আপলোড সফল হয়নি');
          setProgress(Math.round(((i + 1) / queue.length) * 100));
        }
        setQueue([]); setProgress(0); setStudentName('');
        notify("✅ সফলভাবে পাঠানো হয়েছে!");
      } catch (e) { notify("❌ ত্রুটি: " + e.message, true); }
      setLoading(false);
    };

    const fetchMedia = useCallback(async (mode) => {
      setLoading(true);
      try {
        const res = await fetch(`${API}/registry/list?status=${mode}`);
        setItems(await res.json());
      } catch (e) { notify("❌ লোড করতে সমস্যা হয়েছে", true); }
      setLoading(false);
    }, []);

    useEffect(() => {
      if (tab === 'gallery') fetchMedia('public');
      if (tab === 'admin')   fetchMedia('admin');
    }, [tab, fetchMedia]);

    const logoTap = () => {
      const next = tapCount + 1;
      if (next >= 5 && !isAdmin) {
        setIsAdmin(true); setTab('admin'); setTapCount(0);
        notify("🔐 অ্যাডমিন প্যানেল আনলক হয়েছে");
      } else {
        setTapCount(next);
        setTimeout(() => setTapCount(0), 2000);
      }
    };

    return (
      <div className="shell">
        {/* নাম ইনপুট মোডাল */}
        {showModal && (
          <div className="modal-overlay">
            <div className="modal-card">
              <h2 style={{fontFamily:'Noto Serif Bengali'}}>আপনার নাম</h2>
              <input 
                className="modal-input" 
                placeholder="যেমন: রেজওয়ান আহমেদ" 
                value={studentName}
                onChange={(e) => setStudentName(e.target.value)}
              />
              <button className="btn-primary" onClick={handleUpload}>আপলোড শুরু করুন</button>
              <button style={{marginTop:10, border:'none', background:'none', color:'#888', cursor:'pointer'}} onClick={()=>setShowModal(false)}>বাতিল</button>
            </div>
          </div>
        )}

        <header className="header" onClick={logoTap}>
          <div className="brand-name">জানানি কোচিং সেন্টার</div>
          {isAdmin && <div className="admin-pill">🔐 অ্যাডমিনিস্ট্রেশন</div>}
        </header>

        <nav className="nav">
          <button className={`nav-btn ${tab==='upload'?'on':''}`} onClick={()=>setTab('upload')}>📤 আপলোড</button>
          <button className={`nav-btn ${tab==='gallery'?'on':''}`} onClick={()=>setTab('gallery')}>🖼️ গ্যালারি</button>
          {isAdmin && <button className={`nav-btn ${tab==='admin'?'on':''}`} onClick={()=>setTab('admin')}>⏳ পেন্ডিং</button>}
        </nav>

        <main className="main">
          {tab === 'upload' && (
            <div>
              <div className="drop-zone">
                <input type="file" multiple onChange={(e)=>setQueue(Array.from(e.target.files))} />
                <span className="drop-icon">📸</span>
                <div className="drop-title">ফাইল বেছে নিন</div>
              </div>
              {queue.length > 0 && (
                <div className="file-list">
                  {queue.map((f, i) => (
                    <div key={i} className="file-card">📎 {f.name}</div>
                  ))}
                </div>
              )}
              {loading && <div className="progress-track"><div className="progress-fill" style={{width:`${progress}%`}}></div></div>}
              <button className="btn-primary" disabled={!queue.length || loading} onClick={()=>setShowModal(true)}>
                📤 আপলোড করুন
              </button>
            </div>
          )}

          {(tab === 'gallery' || tab === 'admin') && (
            <div className="gallery-grid">
              {items.map(item => (
                <div key={item.id} className="media-card">
                  <div className="uploader-badge">👤 {item.studentName}</div>
                  <img src={item.src} loading="lazy" />
                  {tab === 'admin' && (
                    <div className="admin-overlay">
                      <button className="btn-approve" onClick={()=> {/* Approve call */}}>অনুমোদন</button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </main>
      </div>
    );
  };
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
