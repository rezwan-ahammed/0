<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Janani Coaching Centre — জননী ছাত্র পোর্টাল</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Noto+Serif+Bengali:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ── Original CSS from janani-portal.html ── */
    :root {
      --forest:   #1a4a3a;
      --emerald:  #2d6a4f;
      --leaf:     #52b788;
      --mint:     #95d5b2;
      --cream:    #f8f5ef;
      --sand:     #e9e4d8;
      --amber:    #c97d2e;
      --clay:     #8b4513;
      --ink:      #1c2b24;
      --mist:     #6b8f7a;
      --glass-bg: rgba(248,245,239,0.72);
      --glass-bd: rgba(255,255,255,0.55);
      --shadow-deep: 0 32px 64px rgba(26,74,58,0.18), 0 8px 24px rgba(26,74,58,0.1);
      --shadow-card: 0 6px 24px rgba(26,74,58,0.10);
      --radius-xl: 28px;
      --radius-lg: 18px;
      --radius-md: 12px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Hind Siliguri', sans-serif; background: var(--cream); min-height: 100vh; display: flex; justify-content: center; padding: 20px 16px; overflow-x: hidden; }

    /* Background texture */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 50% at 20% 10%, rgba(82,183,136,0.22) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 60% at 80% 80%, rgba(45,106,79,0.18) 0%, transparent 55%);
      pointer-events: none; z-index: 0;
    }

    #root { position: relative; z-index: 1; width: 100%; max-width: 480px; }

    .shell {
      background: var(--glass-bg); backdrop-filter: blur(28px) saturate(1.4);
      border: 1.5px solid var(--glass-bd); border-radius: var(--radius-xl);
      box-shadow: var(--shadow-deep); display: flex; flex-direction: column; overflow: hidden;
    }

    .header { padding: 32px 24px 22px; text-align: center; border-bottom: 1px solid rgba(149,213,178,0.25); cursor: pointer; }
    .logo-wrap { display: inline-flex; align-items: center; justify-content: center; width: 80px; height: 80px; border-radius: 50%; background: white; box-shadow: 0 4px 20px rgba(26,74,58,0.15); margin-bottom: 12px; }
    .logo { height: 64px; width: 64px; object-fit: contain; }
    .brand-name { font-family: 'Noto Serif Bengali', serif; font-size: 1.35rem; font-weight: 700; color: var(--forest); }
    
    .nav { display: flex; background: rgba(255,255,255,0.35); border-bottom: 1px solid rgba(149,213,178,0.3); }
    .nav-btn { flex: 1; padding: 15px 0; border: none; background: none; font-weight: 700; color: var(--mist); cursor: pointer; }
    .nav-btn.on { color: var(--forest); box-shadow: inset 0 -3px 0 var(--leaf); }

    .main { padding: 22px 20px 28px; flex: 1; min-height: 340px; }

    /* ── Modal Design ── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(26, 74, 58, 0.4); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 10000; padding: 20px; }
    .modal-card { background: var(--glass-bg); border: 1.5px solid var(--glass-bd); border-radius: var(--radius-xl); padding: 32px; width: 100%; max-width: 380px; text-align: center; box-shadow: var(--shadow-deep); }
    .modal-input { width: 100%; padding: 14px; border-radius: var(--radius-md); border: 1.5px solid rgba(82, 183, 136, 0.3); background: rgba(255, 255, 255, 0.6); font-family: inherit; font-size: 1rem; margin: 20px 0; outline: none; }

    /* ── Drop Zone & List ── */
    .drop-zone { border: 2px dashed rgba(82,183,136,0.45); border-radius: var(--radius-lg); padding: 38px 20px; text-align: center; background: rgba(255,255,255,0.42); position: relative; }
    .drop-zone input { opacity: 0; position: absolute; inset: 0; cursor: pointer; }
    .btn-primary { width: 100%; margin-top: 20px; padding: 17px; background: linear-gradient(135deg, var(--emerald), var(--forest)); color: white; border: none; border-radius: var(--radius-lg); font-weight: 700; cursor: pointer; box-shadow: 0 8px 24px rgba(26,74,58,0.28); }

    .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .media-card { aspect-ratio: 1; border-radius: var(--radius-lg); overflow: hidden; background: var(--sand); position: relative; box-shadow: var(--shadow-card); border: 1.5px solid rgba(255,255,255,0.7); }
    .media-card img, .media-card video { width: 100%; height: 100%; object-fit: cover; }
    
    .uploader-badge { position: absolute; top: 8px; left: 8px; background: rgba(255, 255, 255, 0.85); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: 700; color: var(--forest); z-index: 5; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--forest); color: white; padding: 13px 26px; border-radius: 30px; font-weight: 700; z-index: 9999; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect, useCallback, useRef } = React;
  const API = "https://janani-backend-api.onrender.com/api/v1";

  const App = () => {
    const [tab, setTab] = useState('upload');
    const [queue, setQueue] = useState([]);
    const [loading, setLoading] = useState(false);
    const [progress, setProgress] = useState(0);
    const [items, setItems] = useState([]);
    const [isAdmin, setIsAdmin] = useState(false);
    const [showModal, setShowModal] = useState(false);
    const [studentName, setStudentName] = useState('');
    const [tapCount, setTapCount] = useState(0);
    const [toast, setToast] = useState(null);

    const notify = (msg, isErr = false) => {
      setToast({ msg, isErr });
      setTimeout(() => setToast(null), 3500);
    };

    const handleUpload = async () => {
      if (!studentName.trim()) return alert("দয়া করে আপনার নাম লিখুন");
      setShowModal(false); setLoading(true);
      try {
        for (let i = 0; i < queue.length; i++) {
          const fd = new FormData();
          fd.append('file', queue[i]);
          fd.append('studentName', studentName);
          const res = await fetch(`${API}/registry/upload`, { method: 'POST', body: fd });
          if (!res.ok) throw new Error("আপলোড সফল হয়নি");
          setProgress(Math.round(((i + 1) / queue.length) * 100));
        }
        setQueue([]); setProgress(0); setStudentName('');
        notify("✅ জননী পোর্টালে সফলভাবে জমা হয়েছে");
      } catch (e) { notify(`❌ ${e.message}`, true); }
      setLoading(false);
    };

    const fetchMedia = useCallback(async (mode) => {
      setLoading(true);
      try {
        const res = await fetch(`${API}/registry/list?status=${mode}`);
        setItems(await res.json());
      } catch (e) { notify("❌ লোড করতে সমস্যা হয়েছে", true); }
      setLoading(false);
    }, []);

    useEffect(() => {
      if (tab === 'gallery') fetchMedia('public');
      if (tab === 'admin') fetchMedia('admin');
    }, [tab, fetchMedia]);

    return (
      <div className="shell">
        {showModal && (
          <div className="modal-overlay">
            <div className="modal-card">
              <h2 style={{fontFamily:'Noto Serif Bengali', color: 'var(--forest)'}}>আপনার নাম</h2>
              <input className="modal-input" placeholder="যেমন: রেজওয়ান আহমেদ" value={studentName} onChange={(e)=>setStudentName(e.target.value)} />
              <button className="btn-primary" style={{marginTop: 0}} onClick={handleUpload}>আপলোড শুরু করুন</button>
              <button style={{marginTop:15, border:'none', background:'none', color:'#888', cursor:'pointer'}} onClick={()=>setShowModal(false)}>বাতিল</button>
            </div>
          </div>
        )}

        <header className="header" onClick={()=>{const n=tapCount+1; if(n>=5){setIsAdmin(true);setTab('admin');setTapCount(0);}else{setTapCount(n)}}}>
          <div className="logo-wrap">
            <img className="logo" src="https://i.ibb.co.com/cKhJ7Sbv/1000032566-removebg-preview.png" alt="Janani Logo" />
          </div>
          <div className="brand-name">জননী কোচিং সেন্টার</div>
          {isAdmin ? <div style={{fontSize:'0.7rem', color:'red', fontWeight:800}}>🔐 অ্যাডমিনিস্ট্রেশন</div> : <div style={{fontSize:'0.7rem', color:'var(--mist)'}}>JANANI STUDENT PORTAL</div>}
        </header>

        <nav className="nav">
          <button className={`nav-btn ${tab==='upload'?'on':''}`} onClick={()=>setTab('upload')}>📤 আপলোড</button>
          <button className={`nav-btn ${tab==='gallery'?'on':''}`} onClick={()=>setTab('gallery')}>🖼️ গ্যালারি</button>
          {isAdmin && <button className={`nav-btn ${tab==='admin'?'on':''}`} onClick={()=>setTab('admin')}>⏳ পেন্ডিং</button>}
        </nav>

        <main className="main">
          {tab === 'upload' && (
            <div>
              <div className="drop-zone">
                <input type="file" multiple accept="image/*,video/*" onChange={(e)=>setQueue(Array.from(e.target.files))} />
                <span style={{fontSize:'2.4rem'}}>📸</span>
                <div style={{fontWeight:600, color:'var(--forest)', marginTop:10}}>ফাইল বেছে নিন</div>
              </div>
              {queue.length > 0 && <button className="btn-primary" onClick={()=>setShowModal(true)}>📤 {queue.length}টি ফাইল আপলোড করুন</button>}
              {loading && progress > 0 && <div style={{textAlign:'center', marginTop:10}}>আপলোড হচ্ছে... {progress}%</div>}
            </div>
          )}

          {(tab === 'gallery' || tab === 'admin') && (
            <div className="gallery-grid">
              {items.map(item => (
                <div key={item.id} className="media-card">
                  <div className="uploader-badge">👤 {item.studentName}</div>
                  {item.fileName.match(/\.(mp4|webm|mov)$/i) ? <video src={item.src} muted playsInline /> : <img src={item.src} loading="lazy" />}
                </div>
              ))}
            </div>
          )}
        </main>
        {toast && <div className="toast">{toast.msg}</div>}
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
