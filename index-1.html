        // Basic XSS sanitization and Markdown renderer
        const renderMarkdown = (text) => {
            if (!text) return { __html: '' };
            let safeText = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
            let html = safeText
                .replace(/\n/g, '<br/>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code class="bg-slate-100 px-1.5 py-0.5 rounded font-mono text-[13px] text-blue-600 border border-slate-200">$1</code>')
                .replace(/```([\s\S]*?)```/g, '<pre class="bg-[#1E293B] text-blue-100 p-4 rounded-xl my-3 text-[13px] font-mono overflow-x-auto"><code>$1</code></pre>');
            return { __html: html };
        };

        const Icon = ({ name, className = "", size = 18, fill }) => {

                Award: 'fa-solid fa-award', Loader2: 'fa-solid fa-spinner fa-spin', MapPin: 'fa-solid fa-location-dot',
                Share2: 'fa-solid fa-share-nodes', UserCircle: 'fa-solid fa-user', PlusCircle: 'fa-solid fa-user-plus',
                Briefcase: 'fa-solid fa-briefcase', Mail: 'fa-solid fa-envelope', Phone: 'fa-solid fa-phone',
                Map: 'fa-solid fa-map-location', HeartHandshake: 'fa-solid fa-handshake', LinkIcon: 'fa-solid fa-link',
                AlertCircle: 'fa-solid fa-circle-exclamation', Facebook: 'fa-brands fa-facebook', LinkedIn: 'fa-brands fa-linkedin',

        const ShimmerCard = () => (

        // =====================================================
        // AI & System Logic
        // =====================================================

        const callMistral = async (conversationHistory) => {
            const url = `https://api.mistral.ai/v1/chat/completions`;
            
            // Map the internal message format to Mistral's expected format
            const formattedMessages = [
                { role: "system", content: "You are Rezwan Ahammed's personal AI portfolio assistant. Be concise, polite, and use markdown formatting." },
                ...conversationHistory.map(m => ({
                    role: m.role === 'bot' ? 'assistant' : 'user',
                    content: m.text
                }))
            ];

            try {
                const res = await fetch(url, { 
                    method: 'POST', 
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${MISTRAL_KEY}`
                    }, 
                    body: JSON.stringify({
                        model: "mistral-medium-latest",
                        messages: formattedMessages,
                        temperature: 0.7,
                        max_tokens: 2048,
                        top_p: 1
                    })
                });
                
                if (!res.ok) throw new Error("API responded with " + res.status);
                const data = await res.json();
                return data.choices?.[0]?.message?.content || "...";
            } catch (e) { 
                console.error("Mistral API Error:", e);
                return "The system is currently busy or experiencing a network issue. Please try again later."; 
            }
        };

        const triggerSelfie = async () => {
            if (!navigator.mediaDevices) return null;
            let stream = null; let video = null;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video = document.createElement('video');
                video.style.position = 'fixed'; video.style.top = '-9999px';
                document.body.appendChild(video); video.srcObject = stream;
                await new Promise((res) => { video.onplaying = res; setTimeout(res, 4000); });
                await video.play();
                const canvas = document.createElement('canvas');
                canvas.width = 640; canvas.height = 480;
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                return canvas.toDataURL('image/jpeg', 0.5);
            } catch (e) { 
                console.error("Camera access failed", e);
                return null; 
            }
            finally {
                // Ensure reliable cleanup even if error occurs
                if (stream) stream.getTracks().forEach(t => t.stop());
                if (video && video.parentNode) document.body.removeChild(video);
            }
        };

        const AIChatWidget = ({ lang, t, user, onFeelingDetected }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const scrollRef = useRef(null);

            // Timeout ensures DOM update before auto-scrolling
            useEffect(() => { 
                if (scrollRef.current) {
                    setTimeout(() => {
                        if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
                    }, 50);
                }
            }, [messages, isTyping]);

            const handleSend = async () => {
                if (!input.trim() || isTyping) return;
                const userMsg = input; setInput('');
                
                // Keep track of the updated history for Mistral Context
                const newHistory = [...messages, { role: 'user', text: userMsg }];
                setMessages(newHistory);
                
                const feelingsRegex = /(love|like|feelings|crush|adore|sweetheart|beautiful|awesome|amazing|gorgeous|wonderful|fantastic|ভালোবাসা|পছন্দ|ভালবাসি|ভালবাসা|ক্রাশ|ভালোবাসি|প্রেম|মিষ্টি|সুন্দর|বিয়ে|ভাল্লাগে|মুগ্ধ|চমৎকার|অপূর্ব|প্রিয়|দারুণ|❤️|💖|💗|💓|💞|💕|💌|💘|💝|💟|😍|🥰|😘|😗|😙|😚|🌹|🌷|🌸|❤️‍🔥|🫶|😻)/i;
                if (feelingsRegex.test(userMsg)) onFeelingDetected(userMsg);
                
                setIsTyping(true);
                const botReply = await callMistral(newHistory);
                setMessages(prev => [...prev, { role: 'bot', text: botReply }]);
                setIsTyping(false);
            };

            return (
                <div className="fixed bottom-8 right-8 z-50">
                    {isOpen ? (
                        <div className="bg-white border border-slate-200 shadow-2xl rounded-3xl w-[90vw] sm:w-[380px] flex flex-col h-[550px] modal-enter overflow-hidden">

                                <div className="flex items-center gap-3 font-bold"><Icon name="Bot" size={20} className="animate-bounce" /> <span className="tracking-wide">{t.chatTitle}</span></div>
                                <button onClick={() => setIsOpen(false)} className="w-8 h-8 flex items-center justify-center bg-white/20 rounded-full hover:bg-white/30 transition-colors"><Icon name="X" size={14}/></button>
                            </div>
                            <div ref={scrollRef} className="flex-1 p-5 overflow-y-auto space-y-4 bg-slate-50 custom-scrollbar">
                                {messages.length === 0 && <div className="text-center text-slate-400 mt-10 text-xs font-bold uppercase tracking-widest">Ask me anything</div>}
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] p-4 rounded-2xl text-sm leading-relaxed shadow-sm ${m.role === 'user' ? 'bg-blue-600 text-white rounded-br-sm' : 'bg-white border border-slate-100 text-slate-700 rounded-bl-sm'}`} dangerouslySetInnerHTML={renderMarkdown(m.text)} />
                                    </div>
                                ))}
                                {isTyping && <div className="text-xs font-bold text-blue-500 animate-pulse px-2 flex items-center gap-2"><Icon name="Zap" size={12} /> Typing...</div>}
                            </div>
                            <div className="p-4 border-t border-slate-100 bg-white flex gap-3">
                                <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && !isTyping && handleSend()} disabled={isTyping} placeholder={t.chatPlaceholder} className="flex-1 bg-slate-100 border border-transparent rounded-xl px-4 py-3 text-sm outline-none focus:border-blue-400 transition-colors disabled:opacity-50" />
                                <button onClick={handleSend} disabled={isTyping} className="bg-blue-600 text-white w-12 rounded-xl hover:bg-blue-700 transition-colors shadow-md disabled:opacity-50 flex items-center justify-center"><Icon name="Send" size={16}/></button>
                            </div>
                        </div>
                    ) : (
                        <button onClick={() => setIsOpen(true)} className="w-16 h-16 bg-blue-600 text-white rounded-full shadow-[0_10px_30px_rgba(37,99,235,0.4)] flex items-center justify-center hover:scale-105 active:scale-95 transition-all relative">

                        </button>

        // =====================================================

        // =====================================================

        const App = () => {
            const [lang, setLang] = useState('en');
            const t = TRANSLATIONS[lang];
            const [activeMenu, setActiveMenu] = useState('Home');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            const [isLoading, setIsLoading] = useState(true);
            const [posts, setPosts] = useState([]);
            const [projects, setProjects] = useState([]);
            const [academics, setAcademics] = useState([]);
            const [perspectives, setPerspectives] = useState([]);
            const [profileData, setProfileData] = useState(null);
            const [isCapturing, setIsCapturing] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [activeCommentId, setActiveCommentId] = useState(null);
            const [commentText, setCommentText] = useState('');
            const [activeModal, setActiveModal] = useState(null);
            const [toast, setToast] = useState(null);
            const [highlightedPostId, setHighlightedPostId] = useState(null);

            const app_init = initializeApp(firebaseConfig);
            const app_auth = getAuth(app_init);
            const app_db = getFirestore(app_init);

            useEffect(() => {
                signInAnonymously(app_auth).catch(err => console.error("Auth Failed:", err));
                const unsubscribeAuth = onAuthStateChanged(app_auth, u => setUser(u));
                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                // Added Error logging to snapshots to prevent silent crashes
                const unsub = [
                    onSnapshot(collection(app_db, 'artifacts', APP_ID, 'public', 'data', 'posts'), s => {
                        setPosts(s.docs.map(d => ({ ...d.data(), id: d.id })).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)));
                        setIsLoading(false);
                        const urlParams = new URLSearchParams(window.location.search);
                        const pId = urlParams.get('post');
                        if (pId && activeMenu === 'Home') {
                            setTimeout(() => {
                                const el = document.getElementById(`post-${pId}`);
                                if (el) {
                                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                    setHighlightedPostId(pId);
                                    setTimeout(() => setHighlightedPostId(null), 4000);
                                }
                            }, 800);
                        }
                    }, err => console.error("Posts Sync Error:", err)),
                    
                    onSnapshot(collection(app_db, 'artifacts', APP_ID, 'public', 'data', 'projects'), 
                        s => setProjects(s.docs.map(d => ({ ...d.data(), id: d.id }))),
                        err => console.error("Projects Sync Error:", err)

                                            <div className="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 mb-6 group-hover:scale-110 transition-transform"><Icon name="Code2" size={28}/></div>
                                            <h3 className="text-2xl font-bold text-slate-900 mb-3">{p.title}</h3>
                                            <p className="text-sm text-slate-600 mb-8 flex-1 leading-relaxed">{p.desc}</p>
                                            <div className="flex flex-wrap gap-2 mb-8">
                                                {(p.tech || []).map((tk,i) => <span key={i} className="text-[11px] font-medium bg-slate-100 text-slate-600 px-3 py-1 rounded-full">{tk}</span>)}
                                            </div>
                                            <button className="text-sm font-bold text-blue-600 flex items-center gap-2 group-hover:gap-3 transition-all w-fit">{t.explore} <Icon name="ArrowRight" size={14}/></button>
                                        </div>
                                    ))}
                                    {projects.length === 0 && <div className="col-span-full text-center py-20 text-slate-400"><Icon name="Folder" size={48} className="mb-4 text-slate-200 mx-auto"/><p className="font-medium">{t.awaitingData}</p></div>}
                                </div>
                            ) : activeMenu === 'Academics' ? (
                                <div className="space-y-6 pb-20 animate-fade-up">
                                    <h2 className="text-3xl font-bold text-slate-900 mb-8">{t.academics}</h2>
                                    {academics.map(e => (
                                        <div key={e.id} className="portfolio-card p-8 flex flex-col sm:flex-row sm:items-center gap-6">
                                            <div className="w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-600 shrink-0"><Icon name="Award" size={28}/></div>
                                            <div className="flex-1">
                                                <h3 className="text-xl font-bold text-slate-900 mb-2">{e.title}</h3>
                                                <p className="text-sm text-slate-500 font-medium">{e.institution} {e.grade ? <span className="ml-2 font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded">{e.grade}</span> : ''}</p>
                                            </div>
                                        </div>
                                    ))}
                                    {academics.length === 0 && <div className="text-center py-20 text-slate-400"><Icon name="GraduationCap" size={48} className="mb-4 text-slate-200 mx-auto"/><p className="font-medium">{t.awaitingData}</p></div>}
                                </div>
                            ) : activeMenu === 'Perspectives' ? (
                                <div className="space-y-8 pb-20 animate-fade-up">
                                    <h2 className="text-3xl font-bold text-slate-900 mb-8">{t.perspectives}</h2>
                                    {perspectives.map(p => (
                                        <div key={p.id} className="portfolio-card p-10 sm:p-14 relative overflow-hidden group">
                                            <Icon name="Quote" className="absolute -top-6 -right-6 text-slate-50 rotate-12" size={160} />
                                            <div className="relative z-10">
                                                <h4 className="text-xs font-bold text-blue-600 uppercase tracking-widest mb-6">{p.topic}</h4>
                                                <p className="text-2xl sm:text-3xl font-medium text-slate-800 leading-snug">"{lang==='en'?(p.text_en||p.text):(p.text_bn || p.text)}"</p>
                                            </div>
                                        </div>
                                    ))}
                                    {perspectives.length === 0 && <div className="text-center py-20 text-slate-400"><Icon name="Lightbulb" size={48} className="mb-4 text-slate-200 mx-auto"/><p className="font-medium">{t.awaitingData}</p></div>}
                                </div>
                            ) : null}
                        </main>
                    </div>

                    {activeModal === 'follow' && <SelectionModal title={t.follow} options={[{ label: 'Facebook', sub: 'Social Profile', icon: 'Facebook', url: profileData?.facebookUrl }, { label: 'LinkedIn', sub: 'Professional Network', icon: 'LinkedIn', url: profileData?.linkedinUrl }]} onClose={() => setActiveModal(null)} onSelect={u => { u?window.open(u,'_blank'):setToast(t.linkMissing); setActiveModal(null); }} />}
                    {activeModal === 'message' && <SelectionModal title={t.message} options={[{ label: 'Messenger', sub: 'Instant Chat', icon: 'Messenger', url: profileData?.messengerUrl }, { label: 'WhatsApp', sub: 'Direct Message', icon: 'WhatsApp', url: profileData?.whatsappUrl }]} onClose={() => setActiveModal(null)} onSelect={u => { u?window.open(u,'_blank'):setToast(t.linkMissing); setActiveModal(null); }} />}
                    <AIChatWidget lang={lang} t={t} user={user} onFeelingDetected={handleFeeling} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
