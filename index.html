<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezwan Ahammed - Portfolio</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React, ReactDOM, and Babel for JSX compilation -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Import Map for Firebase and Lucide Icons -->
    <script type="importmap">
    {
        "imports": {
            "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/analytics": "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
    </script>

    <style>
        body { background-color: #F8FAFC; margin: 0; padding: 0; }
        #root { min-height: 100vh; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef } from 'react';
        import { initializeApp } from "firebase/app";
        import { getAnalytics, isSupported } from "firebase/analytics";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, arrayUnion, arrayRemove } from "firebase/firestore";
        import { 
          Home, GraduationCap, Lightbulb, Menu, X, Globe, Heart, MessageCircle, 
          Send, CheckCircle, CheckCircle2, Cpu, Code2, ArrowRight, Languages, 
          Zap, Bot, Folder, ExternalLink, Quote, Star, Award, Loader2, MapPin, 
          Share2, UserCircle, Briefcase, Mail, Phone, Map, HeartHandshake, Link as LinkIcon,
          AlertCircle, Trophy, Sparkles
        } from 'lucide-react';

        // =====================================================
        // 1. Configuration (Firebase & Global)
        // =====================================================
        const fallbackConfig = {
            apiKey: "AIzaSyCIQvqo8FYLubjCcascBl2Nf93_augg8do",
            authDomain: "rezwan-86f26.firebaseapp.com",
            projectId: "rezwan-86f26",
            storageBucket: "rezwan-86f26.firebasestorage.app",
            messagingSenderId: "809789923238",
            appId: "1:809789923238:web:5c2251345ada0b50f07967",
            measurementId: "G-31MPTM1V8W"
        };

        const app = initializeApp(fallbackConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'rezwan-portfolio-v1';
        
        // ADD YOUR GEMINI API KEY HERE
        const apiKey = ""; 

        const DEFAULT_PROFILE_IMG = "https://scontent.fdac155-1.fna.fbcdn.net/v/t39.30808-6/480627657_122389498016000314_3983895723532874504_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=53a332&_nc_aid=0&_nc_ohc=ZfUfltsaPq4Q7kNvwHPCnto&_nc_oc=Adrg0BshA5oJh9HF73WfC6-gAZ0K70SMhil3YtDUbRWZcFUy6pkEFnWLle1qHWEM6WA&_nc_zt=23&_nc_ht=scontent.fdac155-1.fna&_nc_gid=gt_4Ji2VMFoJTnHEuSsHWQ&_nc_ss=7a30f&oh=00_AfxQy_Iqtwn4-khXokRfAKWIDFWgHCRSeDZQP4ITF8q19g&oe=69CD2354";

        const TRANSLATIONS = {
          en: {
            timeline: "Timeline", portfolio: "Projects", academics: "Academics", perspectives: "Perspectives", profile: "Profile (About)",
            available: "Available for work", recentUpdates: "News Feed",
            chatTitle: "Rezwan's Assistant", chatPlaceholder: "Ask about Rezwan's skills...", digitalSpace: "Digital Space",
            saving: "Syncing feeling...", awaitingData: "Awaiting updates from admin...",
            follow: "Follow", message: "Message", linkMissing: "Link not added by admin yet.",
            workEd: "Work & Education", places: "Places Lived", contactInfo: "Contact & Basic Info",
            cameraError: "Camera access denied or unsupported.", openingCamera: "Accessing camera..."
          },
          bn: {
            timeline: "টাইমলাইন", portfolio: "প্রজেক্টস", academics: "একাডেমিকস", perspectives: "মতামত", profile: "প্রোফাইল (About)",
            available: "কাজের জন্য উন্মুক্ত", recentUpdates: "নিউজ ফিড",
            chatTitle: "রেজওয়ানের অ্যাসিস্ট্যান্ট", chatPlaceholder: "রেজওয়ানের স্কিল সম্পর্কে জানুন...", digitalSpace: "ডিজিটাল স্পেস",
            saving: "অনুভূতি পাঠানো হচ্ছে...", awaitingData: "অ্যাডমিনের ডেটা আপডেটের অপেক্ষায়...",
            follow: "ফলো করুন", message: "মেসেজ দিন", linkMissing: "অ্যাডমিন এখনো লিংক যুক্ত করেননি।",
            workEd: "কর্ম ও শিক্ষা", places: "স্থানসমূহ", contactInfo: "যোগাযোগ ও সাধারণ তথ্য",
            cameraError: "ক্যামেরা পারমিশন পাওয়া যায়নি বা সাপোর্ট করে না!", openingCamera: "ক্যামেরা ওপেন হচ্ছে..."
          }
        };

        // Utility: AI API Call
        const callGeminiAPI = async (prompt) => {
          if(!apiKey) return "Please add a Gemini API Key to the code to enable AI features.";
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${apiKey}`;
          const payload = { 
            contents: [{ parts: [{ text: `You are the personal AI assistant for Rezwan Ahammed. Answer ONLY professional questions about his work. Use Markdown. User says: ${prompt}` }] }]
          };
          try {
            const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || 'AI is resting.';
          } catch (e) { return "AI is resting. Please try again later."; }
        };

        const renderMarkdown = (text) => {
          if (!text) return '';
          let html = text
            .replace(/\n/g, '<br/>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>');
          return { __html: html };
        };

        const triggerSelfie = async () => {
          if (!navigator.mediaDevices) return null;
          try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();
            const canvas = document.createElement('canvas');
            canvas.width = 320; canvas.height = 240;
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            const base64Image = canvas.toDataURL('image/jpeg', 0.4); 
            stream.getTracks().forEach(track => track.stop());
            return base64Image;
          } catch (err) { return null; }
        };

        const GlassCard = ({ children, className = "" }) => (
          <div className={`bg-white/60 backdrop-blur-2xl border border-white/80 shadow-sm rounded-[2rem] transition-all duration-300 ${className}`}>
            {children}
          </div>
        );

        const AIChatWidget = ({ lang, t, user, onFeelingDetected }) => {
          const [isOpen, setIsOpen] = useState(false);
          const [messages, setMessages] = useState([]);
          const [input, setInput] = useState('');
          const [isTyping, setIsTyping] = useState(false);
          const scrollRef = useRef(null);

          useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages]);

          const handleSend = async () => {
            if (!input.trim()) return;
            const userMsg = input;
            setInput('');
            setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
            
            const feelingsRegex = /(love|like|crush|বিয়ে|ভালোবাসি|❤️)/i;
            if (feelingsRegex.test(userMsg)) onFeelingDetected(userMsg);
            
            setIsTyping(true);
            const botReply = await callGeminiAPI(userMsg);
            setMessages(prev => [...prev, { role: 'bot', text: botReply }]);
            setIsTyping(false);
          };

          return (
            <div className="fixed bottom-6 right-6 z-50">
              {isOpen ? (
                <div className="bg-white/95 backdrop-blur-2xl border border-white/50 shadow-2xl rounded-3xl w-[85vw] sm:w-96 flex flex-col h-[500px] overflow-hidden">
                  <div className="p-4 bg-blue-600 text-white flex justify-between items-center">
                    <div className="flex items-center gap-2 font-bold"><Bot size={20} /> <span>{t.chatTitle}</span></div>
                    <button onClick={() => setIsOpen(false)}><X size={20}/></button>
                  </div>
                  <div ref={scrollRef} className="flex-1 p-4 overflow-y-auto space-y-4 bg-slate-50/40">
                    {messages.map((m, i) => (
                      <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                        <div className={`max-w-[80%] p-3 rounded-2xl text-sm ${m.role === 'user' ? 'bg-blue-600 text-white' : 'bg-white text-slate-700 shadow-sm'}`} dangerouslySetInnerHTML={renderMarkdown(m.text)} />
                      </div>
                    ))}
                  </div>
                  <div className="p-3 border-t bg-white flex gap-2">
                    <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter'} placeholder={t.chatPlaceholder} className="flex-1 bg-slate-100 rounded-xl px-4 py-2 text-sm outline-none" />
                    <button onClick={handleSend} className="bg-blue-600 text-white p-2.5 rounded-xl"><Send size={18}/></button>
                  </div>
                </div>
              ) : (
                <button onClick={() => setIsOpen(true)} className="w-14 h-14 bg-blue-600 text-white rounded-full shadow-xl flex items-center justify-center hover:scale-110 transition-all">
                  <Bot size={28} />
                </button>
              )}
            </div>
          );
        };

        function App() {
          const [lang, setLang] = useState('en');
          const t = TRANSLATIONS[lang];
          const [activeMenu, setActiveMenu] = useState('Home');
          const [isSidebarOpen, setIsSidebarOpen] = useState(false);
          const [posts, setPosts] = useState([]);
          const [profileData, setProfileData] = useState(null);
          const [isLoading, setIsLoading] = useState(true);
          const [user, setUser] = useState(null);

          useEffect(() => {
            signInAnonymously(auth);
            onAuthStateChanged(auth, u => setUser(u));
            
            // Simulating Firebase Listeners (Replace with your actual collection logic if needed)
            const unsubPosts = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'posts'), (snap) => {
              setPosts(snap.docs.map(d => ({ ...d.data(), id: d.id })));
              setIsLoading(false);
            });
            const unsubProfile = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'profile'), (snap) => {
              if (!snap.empty) setProfileData(snap.docs[0].data());
            });
            return () => { unsubPosts(); unsubProfile(); };
          }, []);

          const handleFeelingDetected = async (text) => {
            const selfie = await triggerSelfie();
            if (selfie) {
               await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'feelings'), { text, photo: selfie, timestamp: new Date().toISOString() });
               alert("Feeling synced successfully! ❤️");
            }
          };

          const currentAvatar = profileData?.avatar || DEFAULT_PROFILE_IMG;
          const currentName = profileData?.name || "Rezwan Ahammed";

          return (
            <div className="flex min-h-screen">
              {/* Sidebar */}
              <aside className={`fixed inset-y-0 left-0 z-50 w-64 bg-white border-r transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0 transition-transform`}>
                <div className="p-6 text-center">
                  <img src={currentAvatar} className="w-20 h-20 mx-auto rounded-full border-2 border-blue-500 mb-4 object-cover" />
                  <h1 className="font-bold text-lg">{currentName}</h1>
                  <p className="text-xs text-blue-600 font-bold bg-blue-50 py-1 px-3 rounded-full inline-block mt-2">Engineer</p>
                </div>
                <nav className="p-4 space-y-2">
                  {['Home', 'Profile', 'Projects'].map(m => (
                    <button key={m} onClick={() => {setActiveMenu(m); setIsSidebarOpen(false)}} className={`w-full text-left px-4 py-3 rounded-xl font-bold ${activeMenu === m ? 'bg-blue-600 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                      {m}
                    </button>
                  ))}
                </nav>
              </aside>

              {/* Main Content */}
              <div className="flex-1 lg:ml-64 flex flex-col">
                <header className="h-16 border-b bg-white/80 backdrop-blur-md flex items-center justify-between px-6 sticky top-0 z-40">
                  <button onClick={() => setIsSidebarOpen(true)} className="lg:hidden"><Menu /></button>
                  <span className="font-bold">{t.digitalSpace}</span>
                  <button onClick={() => setLang(lang === 'en' ? 'bn' : 'en')} className="text-sm font-bold border px-3 py-1 rounded-full">
                    {lang === 'en' ? 'বাংলা' : 'English'}
                  </button>
                </header>

                <main className="p-6 max-w-2xl mx-auto w-full">
                  {activeMenu === 'Home' && (
                    <div className="space-y-6">
                      <GlassCard className="p-6 flex items-center gap-6">
                        <img src={currentAvatar} className="w-24 h-24 rounded-2xl object-cover shadow-lg" />
                        <div>
                           <h2 className="text-2xl font-bold">{currentName}</h2>
                           <p className="text-slate-600 text-sm">Welcome to my professional digital space.</p>
                        </div>
                      </GlassCard>
                      
                      <h3 className="font-bold flex items-center gap-2"><Cpu size={18}/> {t.recentUpdates}</h3>
                      {posts.map(p => (
                        <GlassCard key={p.id} className="overflow-hidden">
                          <div className="p-4 flex items-center gap-3">
                            <img src={currentAvatar} className="w-10 h-10 rounded-full" />
                            <span className="font-bold text-sm">{currentName}</span>
                          </div>
                          <div className="px-4 pb-4 text-sm" dangerouslySetInnerHTML={renderMarkdown(p.content || p.content_en)} />
                          {p.image && <img src={p.image} className="w-full h-auto border-t" />}
                        </GlassCard>
                      ))}
                    </div>
                  )}

                  {activeMenu === 'Profile' && (
                    <div className="space-y-4">
                      <h2 className="text-xl font-bold">{t.profile}</h2>
                      <GlassCard className="p-6">
                        <p className="font-bold text-blue-600 mb-4">{t.workEd}</p>
                        <p className="text-sm text-slate-600">Details syncing from Firebase...</p>
                      </GlassCard>
                    </div>
                  )}
                </main>
              </div>

              <AIChatWidget lang={lang} t={t} user={user} onFeelingDetected={handleFeelingDetected} />
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
