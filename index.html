<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezwan OS | Digital Portfolio</title>
    
    <!-- Premium CDNs -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&family=Hind+Siliguri:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Outfit', 'Hind Siliguri', sans-serif; background-color: #F8FAFF; color: #0f172a; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .animate-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Markdown Styling */
        .markdown-content b, .markdown-content strong { font-weight: 800; color: #1e40af; }
        .markdown-content code { background: #eff6ff; color: #2563eb; padding: 2px 5px; border-radius: 4px; font-family: monospace; font-size: 0.85rem; }
        .markdown-content pre { background: #0f172a; color: #bfdbfe; padding: 15px; border-radius: 12px; margin: 10px 0; overflow-x: auto; font-size: 0.8rem; line-height: 1.4; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // =====================================================
        // ১. কনফিগারেশন (API Key & Model Injected)
        // =====================================================
        const CONFIG = {
            API_KEY: "AIzaSyDY4wzyJNC0uEHCIs9eiqoWPMgbRATCqqw",
            MODEL: "gemini-2.5-flash-preview-09-2025",
            NAME: { en: "Rezwan Ahammed", bn: "রেজওয়ান আহাম্মেদ" },
            ROLE: { en: "Software Engineer", bn: "সফটওয়্যার ইঞ্জিনিয়ার" },
            IMG: "https://scontent.fdac155-1.fna.fbcdn.net/v/t39.30808-6/480627657_122389498016000314_3983895723532874504_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=53a332&_nc_aid=0&_nc_ohc=ZfUfltsaPq4Q7kNvwHPCnto&_nc_oc=Adrg0BshA5oJh9HF73WfC6-gAZ0K70SMhil3YtDUbRWZcFUy6pkEFnWLle1qHWEM6WA&_nc_zt=23&_nc_ht=scontent.fdac155-1.fna&_nc_gid=gt_4Ji2VMFoJTnHEuSsHWQ&_nc_ss=7a30f&oh=00_AfxQy_Iqtwn4-khXokRfAKWIDFWgHCRSeDZQP4ITF8q19g&oe=69CD2354"
        };

        // Markdown Renderer Function
        const renderMarkdown = (text) => {
            if (!text) return { __html: '' };
            let html = text
                .replace(/\n/g, '<br/>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            return { __html: html };
        };

        // =====================================================
        // ২. মেইন অ্যাপ্লিকেশন কম্পোনেন্ট
        // =====================================================
        function App() {
            const [lang, setLang] = useState('en');
            const [activeTab, setActiveTab] = useState('Timeline');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const scrollRef = useRef(null);

            // Auto Scroll for Chat
            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages, isTyping]);

            // AI Chat Implementation
            const handleChat = async () => {
                if (!input.trim()) return;
                const userMsg = input; setInput('');
                setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                setIsTyping(true);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.MODEL}:generateContent?key=${CONFIG.API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: userMsg }] }],
                            systemInstruction: { parts: [{ text: "You are Rezwan's AI Assistant. Answer based on his career as a Software Engineer and Mentor. Use markdown for code and bold text." }] }
                        })
                    });
                    const data = await response.json();
                    const reply = data.candidates[0].content.parts[0].text;
                    setMessages(prev => [...prev, { role: 'bot', text: reply }]);
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'bot', text: "Neural link interrupted. Please verify API Key or Model access." }]);
                }
                setIsTyping(false);
            };

            const NavButton = ({ id, icon: Icon, label }) => (
                <button 
                    onClick={() => { setActiveTab(id); setIsSidebarOpen(false); }}
                    className={`w-full flex items-center justify-between px-6 py-4 rounded-2xl font-bold transition-all duration-300 ${activeTab === id ? 'bg-blue-600 text-white shadow-xl shadow-blue-200' : 'text-slate-500 hover:bg-blue-50'}`}
                >
                    <div className="flex items-center gap-4"><Icon size={20} /> <span>{label}</span></div>
                    {activeTab === id && <lucide.Zap size={14} className="animate-pulse" />}
                </button>
            );

            return (
                <div className="flex min-h-screen">
                    {/* Sidebar */}
                    <aside className={`fixed inset-y-0 left-0 z-50 w-72 bg-white/95 backdrop-blur-xl border-r transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0 transition-transform duration-500`}>
                        <div className="p-10 flex flex-col items-center">
                            <div className="relative group mb-6">
                                <img src={CONFIG.IMG} className="w-24 h-24 rounded-[2rem] border-4 border-white shadow-2xl object-cover" />
                                <div className="absolute -bottom-1 -right-1 bg-blue-600 p-1.5 rounded-full border-4 border-white"><lucide.CheckCircle2 size={12} color="white" /></div>
                            </div>
                            <h1 className="text-xl font-black text-slate-900 tracking-tighter text-center">{CONFIG.NAME[lang]}</h1>
                            <p className="text-[9px] font-black uppercase text-blue-600 bg-blue-50 px-4 py-1.5 rounded-full mt-3 tracking-widest">{CONFIG.ROLE[lang]}</p>
                        </div>
                        <nav className="px-5 space-y-2">
                            <NavButton id="Timeline" icon={lucide.Home} label={lang === 'en' ? "Timeline" : "টাইমলাইন"} />
                            <NavButton id="Projects" icon={lucide.Code2} label={lang === 'en' ? "The Builder" : "প্রজেক্টস"} />
                            <NavButton id="Academics" icon={lucide.GraduationCap} label={lang === 'en' ? "The Mentor" : "অ্যাকাডেমিক"} />
                        </nav>
                        <div className="absolute bottom-10 left-0 w-full px-10">
                            <div className="bg-emerald-50 text-emerald-700 p-4 rounded-2xl border border-emerald-100 font-black text-[9px] uppercase tracking-widest flex items-center gap-3">
                                <div className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div> Active for Research
                            </div>
                        </div>
                    </aside>

                    {/* Content */}
                    <main className="flex-1 lg:ml-72 p-6 sm:p-12 transition-all">
                        <header className="flex justify-between items-center mb-10 sticky top-0 py-4 bg-[#F8FAFF]/80 backdrop-blur-sm z-40">
                            <button onClick={() => setIsSidebarOpen(true)} className="lg:hidden p-4 bg-white rounded-2xl border shadow-sm"><lucide.Menu size={24} /></button>
                            <div className="hidden sm:flex items-center gap-3 bg-white px-6 py-2.5 rounded-full border border-blue-50 shadow-sm">
                                <lucide.Globe size={16} className="text-blue-500" />
                                <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest">Rezwan OS v2.5</span>
                            </div>
                            <button onClick={() => setLang(lang === 'en' ? 'bn' : 'en')} className="px-6 py-2.5 bg-white rounded-full border-2 border-blue-50 font-black text-[10px] flex items-center gap-3 hover:border-blue-500 transition-all uppercase tracking-widest">
                                <lucide.Languages size={16} className="text-blue-500" /> {lang === 'en' ? 'বাংলা' : 'English'}
                            </button>
                        </header>

                        {activeTab === 'Timeline' && (
                            <div className="animate-up">
                                <div className="bg-white p-10 sm:p-20 rounded-[4rem] shadow-[0_40px_100px_rgba(0,0,0,0.02)] border border-white relative overflow-hidden">
                                    <div className="absolute -top-10 -right-10 w-64 h-64 bg-blue-500/5 rounded-full blur-[100px]"></div>
                                    <h1 className="text-5xl sm:text-8xl font-black tracking-tighter leading-none mb-8">Digital <br/><span className="text-blue-600">Architect.</span></h1>
                                    <p className="text-slate-500 text-xl font-medium max-w-xl mb-12 leading-relaxed">Unifying software architecture, robotics research, and contemporary analysis into one digital ecosystem.</p>
                                    <div className="flex flex-wrap gap-5">
                                        <button className="bg-slate-900 text-white px-10 py-5 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-600 transition-all shadow-2xl">Download CV</button>
                                        <div className="px-10 py-5 rounded-2xl border-2 border-blue-50 font-black text-xs text-slate-300 flex items-center gap-3 uppercase tracking-widest"><lucide.Calendar size={18}/> Joined 2024</div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'Projects' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 animate-up">
                                {[1, 2].map(i => (
                                    <div key={i} className="bg-white p-10 rounded-[3rem] border border-blue-50 hover:shadow-2xl transition-all group">
                                        <div className="w-14 h-14 bg-blue-50 rounded-2xl mb-8 flex items-center justify-center text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-all"><lucide.Folder size={28} /></div>
                                        <h3 className="text-2xl font-black mb-2">{i === 1 ? "Hamar Thakurgaon" : "Monon Academy"}</h3>
                                        <p className="text-blue-500 text-[10px] font-black uppercase tracking-widest mb-6 italic">{i === 1 ? "AI News Verification" : "Ed-Tech OS"}</p>
                                        <p className="text-slate-500 font-medium mb-8 leading-relaxed">Developing scalable solutions for real-world impact using modern tech stacks.</p>
                                        <button className="w-full py-4 rounded-xl bg-slate-50 text-slate-400 font-black text-[10px] uppercase tracking-widest group-hover:bg-blue-600 group-hover:text-white transition-all">View Project</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* AI Chat Widget */}
                    <div className="fixed bottom-8 right-8 z-[100] flex flex-col items-end">
                        <div className={`bg-white glass w-[350px] sm:w-[400px] h-[550px] rounded-[3rem] shadow-2xl mb-6 flex flex-col overflow-hidden transition-all duration-500 transform ${messages.length > 0 || input ? 'scale-100 opacity-100' : 'scale-0 opacity-0'} origin-bottom-right`}>
                            <div className="p-7 bg-blue-600 text-white flex justify-between items-center shadow-lg">
                                <div className="flex items-center gap-3"><lucide.Bot size={22}/><span className="font-black text-sm uppercase">Rezwan Assistant</span></div>
                                <button onClick={() => setMessages([])} className="p-2 hover:bg-white/10 rounded-full"><lucide.X size={20} /></button>
                            </div>
                            <div ref={scrollRef} className="flex-1 overflow-y-auto p-6 space-y-5 bg-[#F8FAFF] custom-scrollbar">
                                {messages.length === 0 && (
                                    <div className="text-center py-20 flex flex-col items-center">
                                        <lucide.Sparkles className="text-blue-400 mb-4 animate-bounce" size={40}/>
                                        <p className="text-slate-300 font-black uppercase text-[10px] tracking-widest">Interface Ready</p>
                                    </div>
                                )}
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div 
                                            className={`max-w-[85%] p-4 rounded-[1.8rem] text-[13px] leading-relaxed markdown-content shadow-sm ${m.role === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white text-slate-700 rounded-tl-none border border-blue-50 font-medium'}`}
                                            dangerouslySetInnerHTML={renderMarkdown(m.text)}
                                        />
                                    </div>
                                ))}
                                {isTyping && <div className="text-[10px] font-black text-blue-500 animate-pulse px-4 uppercase tracking-widest">AI is Thinking...</div>}
                            </div>
                            <div className="p-6 bg-white border-t flex gap-3">
                                <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleChat()} placeholder="Inquire about Rezwan..." className="flex-1 bg-slate-50 px-6 py-4 rounded-2xl text-sm outline-none font-bold placeholder:text-slate-300 border-2 border-transparent focus:border-blue-100 transition-all" />
                                <button onClick={handleChat} className="bg-slate-900 text-white p-4 rounded-2xl hover:bg-blue-600 transition-all shadow-lg shadow-slate-200"><lucide.Send size={22} /></button>
                            </div>
                        </div>
                        <button onClick={() => { if(messages.length === 0) setMessages([{role:'bot', text: 'Greetings! I am Rezwan\'s AI. How can I assist you with his professional profile?'}]) }} className="w-18 h-18 bg-blue-600 text-white rounded-[1.8rem] flex items-center justify-center shadow-2xl hover:scale-110 active:scale-90 transition-all p-5">
                            <lucide.Bot size={36} />
                        </button>
                    </div>
                </div>
            );
        }

        // Initialize App & Lucide
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => { if(window.lucide) window.lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
