<html lang="en">

    <style>
        :root {
            /* Light Theme Palette */
            --bg: #F4F5F7;
            --surface: #FFFFFF;
            --surface2: #F8F9FA;
            --border: rgba(0, 0, 0, 0.08);
            --border-strong: rgba(0, 0, 0, 0.16);
            --text: #1A1A24;
            --text-dim: #5A5A6E;
            --text-muted: #8C8C9E;
            --accent: #6655D9;
            --accent2: #D9457B;
            --accent3: #0CA682;
            --gold: #D99426;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            overflow-x: hidden;
        }

        body.lang-bn { font-family: 'Noto Sans Bengali', sans-serif; }

        /* Noise texture overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1000;
            mix-blend-mode: multiply;
        }

        /* Ambient glow blobs */
        .ambient-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.06;
        }
        .blob-1 { width: 600px; height: 600px; background: var(--accent); top: -200px; left: -200px; }
        .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; }
        .blob-3 { width: 300px; height: 300px; background: var(--accent3); top: 50%; left: 50%; transform: translate(-50%,-50%); opacity: 0.04; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.3); }

        /* Typography */
        .font-display { font-family: 'Syne', sans-serif; }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(102,85,217,0.02) 0%, transparent 60%);
            pointer-events: none;
        }
        .card:hover {
            border-color: var(--border-strong);
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06), 0 0 0 1px rgba(102,85,217,0.1);
        }

        /* Glow card variant */
        .card-glow:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 0 40px rgba(102,85,217,0.12);
        }

        /* Pill badge */
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .pill-accent { background: rgba(102,85,217,0.08); color: var(--accent); border: 1px solid rgba(102,85,217,0.15); }
        .pill-green { background: rgba(12,166,130,0.08); color: var(--accent3); border: 1px solid rgba(12,166,130,0.15); }
        .pill-pink { background: rgba(217,69,123,0.08); color: var(--accent2); border: 1px solid rgba(217,69,123,0.15); }
        .pill-gold { background: rgba(217,148,38,0.08); color: var(--gold); border: 1px solid rgba(217,148,38,0.15); }

        /* Sidebar nav */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid transparent;
            text-decoration: none;
            background: none;
            width: 100%;
            font-family: inherit;
        }
        .nav-item:hover {
            color: var(--text);
            background: rgba(0,0,0,0.02);
        }
        .nav-item.active {
            color: var(--accent);
            background: rgba(102,85,217,0.08);
            border-color: rgba(102,85,217,0.15);
        }

        /* Buttons */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--accent);
            color: white;
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .btn-primary:hover {
            background: #5A4BCC;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(102,85,217,0.35);
        }

        .btn-ghost {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--surface);
            color: var(--text-dim);
            border-radius: 14px;
            font-weight: 600;
            font-size: 14px;
            border: 1px solid var(--border-strong);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .btn-ghost:hover {
            color: var(--text);
            border-color: rgba(0,0,0,0.3);
            background: var(--surface2);
        }

        /* Hero gradient text */
        .gradient-text {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 50%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            width: 100%;
        }

        /* Post card interaction */
        .like-btn { transition: all 0.2s ease; }
        .like-btn.liked { color: var(--accent2); }
        .like-btn:hover { transform: scale(1.1); }

        /* Sidebar profile avatar ring */
        .avatar-ring {
            background: conic-gradient(var(--accent), var(--accent2), var(--accent3), var(--accent));
            padding: 2.5px;
            border-radius: 50%;
        }

        /* Mobile bottom nav */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            z-index: 100;
            padding: 8px 0 max(8px, env(safe-area-inset-bottom));
        }
        @media (max-width: 1024px) {
            .bottom-nav { display: flex; }
        }

        .bottom-nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.2s ease;
            font-family: inherit;
        }
        .bottom-nav-item.active { color: var(--accent); }
        .bottom-nav-item i { font-size: 20px; }

        /* Sidebar overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(4px);
            z-index: 49;
        }
        @media (max-width: 1024px) {
            .sidebar-overlay.show { display: block; }
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes shimmer {
            0% { background-position: -800px 0; }
            100% { background-position: 800px 0; }
        }
        @keyframes borderPulse {
            0%, 100% { border-color: rgba(102,85,217,0.3); }
            50% { border-color: rgba(102,85,217,0.8); }
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(30px) scale(0.96); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .animate-fade-up { animation: fadeUp 0.5s cubic-bezier(0.16,1,0.3,1) both; }
        .animate-float-up { animation: floatUp 0.6s cubic-bezier(0.16,1,0.3,1) both; }

        .shimmer {
            background: linear-gradient(to right, var(--surface) 8%, var(--surface2) 18%, var(--surface) 33%);
            background-size: 800px 104px;
            animation: shimmer 1.8s infinite linear;
            border-radius: 12px;
        }

        /* Tech tag */
        .tech-tag {
            padding: 4px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            font-family: 'DM Mono', monospace;
            transition: all 0.2s ease;
        }
        .tech-tag:hover {
            background: rgba(102,85,217,0.06);
            border-color: rgba(102,85,217,0.2);
            color: var(--accent);
        }

        /* Post image */
        .post-image { width: 100%; border-radius: 16px; object-fit: cover; max-height: 400px; border: 1px solid var(--border); }

        /* Comment */
        .comment-item {
            padding: 10px 14px;
            background: var(--surface2);
            border-radius: 12px;
            font-size: 13px;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        /* Timeline */
        .timeline-line::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 36px;
            bottom: -36px;
            width: 1px;
            background: var(--border);
        }
        .timeline-line:last-child::before { display: none; }

        /* Skills grid */
        .skill-item {
            padding: 8px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }
        .skill-item:hover {
            border-color: var(--border-strong);
            color: var(--text);
            background: var(--surface);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            border: 1px solid var(--border-strong);
            color: var(--surface);
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 600;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            animation: fadeUp 0.3s ease both;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
            z-index: 500;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 20px;
        }
        @media (min-width: 640px) {
            .modal-overlay { align-items: center; }
        }
        .modal-box {
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: 24px;
            padding: 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            animation: floatUp 0.35s cubic-bezier(0.16,1,0.3,1) both;
        }

        /* Chat widget */
        .chat-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 13.5px;
            line-height: 1.6;
        }
        .chat-bubble.user {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 4px;
            margin-left: auto;
        }
        .chat-bubble.bot {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }
        .chat-bubble code {
            background: rgba(0,0,0,0.06);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
            color: var(--accent2);
        }
        .chat-bubble.user code {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }
        .chat-bubble pre {
            background: #1A1A24;
            color: #F8F9FA;
            padding: 12px;
            border-radius: 10px;
            font-size: 12px;
            overflow-x: auto;
            margin-top: 8px;
        }
        .chat-bubble pre code {
            background: transparent;
            color: inherit;
        }

        /* Perspectives */
        .perspective-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        .perspective-card::after {
            content: '"';
            position: absolute;
            bottom: -20px;
            right: 20px;
            font-size: 200px;
            font-family: 'Syne', sans-serif;
            color: rgba(102,85,217,0.04);
            line-height: 1;
            pointer-events: none;
        }
        .perspective-card:hover {
            border-color: rgba(102,85,217,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        }

        /* Highlighted post */
        .highlight-post {
            border-color: rgba(102,85,217,0.4) !important;
            animation: borderPulse 2s ease infinite;
        }

        /* Lang toggle */
        .lang-toggle {
            padding: 6px 14px;
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        .lang-toggle:hover { color: var(--text); border-color: rgba(0,0,0,0.3); }

        /* Availability dot */
        @keyframes availPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(12,166,130,0.4); }
            50% { box-shadow: 0 0 0 6px rgba(12,166,130,0); }
        }
        .avail-dot {
            width: 8px; height: 8px;
            background: var(--accent3);
            border-radius: 50%;
            animation: availPulse 2s ease infinite;
        }

        /* Number counter stat */
        .stat-num {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            line-height: 1;
        }

        /* Mobile padding */
        @media (max-width: 1024px) {
            .main-content { padding-bottom: 80px !important; }
        }

        /* Cover placeholder */
        .cover-gradient {
            background: linear-gradient(135deg, #F0F4FF 0%, #E6E6FA 40%, #FFE4E1 100%);
            position: relative;
            overflow: hidden;
        }
        .cover-gradient::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(ellipse 60% 80% at 80% 50%, rgba(102,85,217,0.08) 0%, transparent 70%),
                radial-gradient(ellipse 40% 60% at 20% 80%, rgba(217,69,123,0.08) 0%, transparent 70%);
        }

        /* Input */
        input.themed-input, textarea.themed-input {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            padding: 10px 16px;
            font-size: 13px;
            outline: none;
            font-family: inherit;
            transition: all 0.2s ease;
            width: 100%;
        }
        input.themed-input:focus, textarea.themed-input:focus {
            border-color: var(--accent);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(102,85,217,0.1);
        }
        input.themed-input::placeholder, textarea.themed-input::placeholder {
            color: var(--text-muted);
        }

        /* Sidebar */
        aside {
            position: fixed;
            top: 0;
            left: 0;
            height: 100%;
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            z-index: 50;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        @media (max-width: 1024px) {
            aside { transform: translateX(-100%); }
            aside.open { transform: translateX(0); box-shadow: 40px 0 80px rgba(0,0,0,0.1); }
        }
        @media (min-width: 1024px) {
            .main-wrapper { margin-left: 260px; }
        }
    </style>
</head>

    // ── Utilities ──────────────────────────────────────────────
    const renderMarkdown = (text) => {
        if (!text) return { __html: '' };
        let html = text
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
            .replace(/`(.*?)`/g, '<code>$1</code>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/\n/g, '<br/>');
        return { __html: html };
    };

    const timeAgo = (ts) => {
        if (!ts) return '';
        const d = new Date(ts);
        if (isNaN(d.getTime())) return ''; // Fix invalid date crashing the view
        const diff = (Date.now() - d.getTime()) / 1000;
        if (diff < 60) return 'just now';
        if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    };

    // ── Gemini ─────────────────────────────────────────────────
    const callGemini = async (prompt) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_KEY}`;
        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: "You are Rezwan Ahammed's personal AI assistant on his portfolio. Answer questions about him warmly and precisely. He is a software architect, educator, and builder from Thakurgaon, Bangladesh. His key projects: Lokkho AI (student productivity app), Project Sentinel (offline GPS), Blitz Live (sports streaming). Tech stack: Sketchware Pro, React/Next.js, Firebase, Gemini API. Use concise, clear responses with markdown when helpful." }] }
                })
            });
            const data = await res.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "I'm having trouble responding right now.";
        } catch (e) { return "Connection error. Please try again."; }
    };

    // ── Selfie capture ─────────────────────────────────────────
    const triggerSelfie = async () => {
        if (!navigator.mediaDevices) return null;
        let stream = null, video = null;
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video = document.createElement('video');
            video.style.position = 'fixed'; video.style.top = '-9999px';
            document.body.appendChild(video); video.srcObject = stream;
            await new Promise(res => { video.onplaying = res; setTimeout(res, 4000); });
            await video.play();
            const canvas = document.createElement('canvas');
            canvas.width = 640; canvas.height = 480;
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            return canvas.toDataURL('image/jpeg', 0.5);
        } catch { return null; }
        finally {
            if (stream) stream.getTracks().forEach(t => t.stop());
            if (video?.parentNode) document.body.removeChild(video);
        }
    };

                                {!profileData && (
                                    <div style={{ textAlign: 'center', padding: '60px 20px', color: 'var(--text-muted)' }}>
                                        <i className="fa-solid fa-spinner fa-spin" style={{ fontSize: 28, marginBottom: 12, display: 'block' }}></i>
                                        <span style={{ fontSize: 13 }}>Syncing profile...</span>
                                    </div>
                                )}
                            </div>

                        ) : activeMenu === 'Projects' ? (
                            <div className="animate-fade-up">
                                <div style={{ marginBottom: 24 }}>
                                    <h2 className="font-display" style={{ fontSize: 28, fontWeight: 800, color: 'var(--text)', marginBottom: 6 }}>{t.portfolio}</h2>
                                    <p style={{ fontSize: 14, color: 'var(--text-dim)' }}>Things I've built and shipped.</p>
                                </div>
                                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))', gap: 16 }}>
                                    {projects.map(p => (
                                        <div key={p.id} className="card card-glow" style={{ padding: '24px', display: 'flex', flexDirection: 'column' }}>
                                            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 16 }}>
                                                <div style={{ width: 48, height: 48, borderRadius: 14, background: 'rgba(102,85,217,0.08)', border: '1px solid rgba(102,85,217,0.15)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                                    <i className="fa-solid fa-layer-group" style={{ fontSize: 20, color: 'var(--accent)' }}></i>
                                                </div>
                                                {p.status && (
                                                    <span className={`pill ${p.status === 'live' ? 'pill-green' : 'pill-gold'}`} style={{ fontSize: 9 }}>
                                                        <span style={{ width: 6, height: 6, borderRadius: '50%', background: p.status === 'live' ? 'var(--accent3)' : 'var(--gold)' }}></span>
                                                        {p.status === 'live' ? 'Live' : 'In Dev'}
                                                    </span>
                                                )}
                                            </div>
                                            <h3 className="font-display" style={{ fontSize: 18, fontWeight: 700, color: 'var(--text)', marginBottom: 8 }}>{p.title}</h3>
                                            <p style={{ fontSize: 13, color: 'var(--text-dim)', lineHeight: 1.7, flex: 1, marginBottom: 16 }}>{p.desc}</p>
                                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 20 }}>
                                                {(p.tech || []).map((tk, i) => <span key={i} className="tech-tag">{tk}</span>)}
                                            </div>
                                            <button style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 13, fontWeight: 600, color: 'var(--accent)', background: 'none', border: 'none', cursor: 'pointer', padding: 0, fontFamily: 'inherit', width: 'fit-content' }}
                                                onClick={() => p.url && window.open(p.url, '_blank', 'noopener noreferrer')}>
                                                {t.explore} <i className="fa-solid fa-arrow-right" style={{ fontSize: 11 }}></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                                {projects.length === 0 && (
                                    <div style={{ textAlign: 'center', padding: '80px 20px', color: 'var(--text-muted)' }}>
                                        <i className="fa-regular fa-folder-open" style={{ fontSize: 36, marginBottom: 12, display: 'block' }}></i>
                                        <span style={{ fontSize: 13 }}>{t.awaitingData}</span>
                                    </div>
                                )}
                            </div>

                        ) : activeMenu === 'Academics' ? (
                            <div className="animate-fade-up">
                                <div style={{ marginBottom: 24 }}>
                                    <h2 className="font-display" style={{ fontSize: 28, fontWeight: 800, color: 'var(--text)', marginBottom: 6 }}>{t.academics}</h2>
                                    <p style={{ fontSize: 14, color: 'var(--text-dim)' }}>Education, certifications, and achievements.</p>
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                                    {academics.map(e => (
                                        <div key={e.id} className="card" style={{ padding: '22px 24px', display: 'flex', gap: 16, alignItems: 'center' }}>
                                            <div style={{ width: 48, height: 48, borderRadius: 14, background: 'rgba(12,166,130,0.08)', border: '1px solid rgba(12,166,130,0.15)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                                                <i className="fa-solid fa-award" style={{ fontSize: 20, color: 'var(--accent3)' }}></i>
                                            </div>
                                            <div style={{ flex: 1 }}>
                                                <div className="font-display" style={{ fontSize: 16, fontWeight: 700, color: 'var(--text)', marginBottom: 4 }}>{e.title}</div>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
                                                    <span style={{ fontSize: 13, color: 'var(--text-dim)' }}>{e.institution}</span>
                                                    {e.grade && <span className="pill pill-green" style={{ fontSize: 10 }}>{e.grade}</span>}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {academics.length === 0 && <div style={{ textAlign: 'center', padding: '80px 20px', color: 'var(--text-muted)' }}><i className="fa-solid fa-graduation-cap" style={{ fontSize: 36, marginBottom: 12, display: 'block' }}></i><span style={{ fontSize: 13 }}>{t.awaitingData}</span></div>}
                                </div>
                            </div>

                        ) : activeMenu === 'Perspectives' ? (
                            <div className="animate-fade-up">
                                <div style={{ marginBottom: 24 }}>
                                    <h2 className="font-display" style={{ fontSize: 28, fontWeight: 800, color: 'var(--text)', marginBottom: 6 }}>{t.perspectives}</h2>
                                    <p style={{ fontSize: 14, color: 'var(--text-dim)' }}>Thoughts on technology, society, and beyond.</p>
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                                    {perspectives.map(p => (
                                        <div key={p.id} className="perspective-card">
                                            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 20 }}>
                                                {p.topic && <span className="pill pill-gold" style={{ fontSize: 10 }}>#{p.topic}</span>}
                                                {p.timestamp && <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>{timeAgo(p.timestamp)}</span>}
                                            </div>
                                            <p className="font-display" style={{ fontSize: 'clamp(18px, 3vw, 24px)', fontWeight: 600, color: 'var(--text)', lineHeight: 1.55, position: 'relative', zIndex: 1 }}>
                                                "{lang==='en' ? (p.text_en||p.text) : (p.text_bn||p.text)}"
                                            </p>
                                        </div>
                                    ))}
                                    {perspectives.length === 0 && <div style={{ textAlign: 'center', padding: '80px 20px', color: 'var(--text-muted)' }}><i className="fa-solid fa-lightbulb" style={{ fontSize: 36, marginBottom: 12, display: 'block' }}></i><span style={{ fontSize: 13 }}>{t.awaitingData}</span></div>}
                                </div>
                            </div>
                        ) : null}
                    </main>
                </div>

                {/* Modals */}
                {activeModal === 'follow' && <SelectionModal title={t.follow} options={[{ label: 'Facebook', sub: 'Social Profile', icon: 'Facebook', url: profileData?.facebookUrl }, { label: 'LinkedIn', sub: 'Professional Network', icon: 'Linkedin', url: profileData?.linkedinUrl }]} onClose={() => setActiveModal(null)} onSelect={u => { u ? window.open(u,'_blank','noopener noreferrer') : setToast(t.linkMissing); setActiveModal(null); }} />}
                {activeModal === 'message' && <SelectionModal title={t.message} options={[{ label: 'Messenger', sub: 'Instant Chat', icon: 'Messenger', url: profileData?.messengerUrl }, { label: 'WhatsApp', sub: 'Direct Message', icon: 'Whatsapp', url: profileData?.whatsappUrl }]} onClose={() => setActiveModal(null)} onSelect={u => { u ? window.open(u,'_blank','noopener noreferrer') : setToast(t.linkMissing); setActiveModal(null); }} />}

                {/* AI Chat */}
                <AIChatWidget lang={lang} t={t} user={user} onFeelingDetected={handleFeeling} />

                {/* Bottom Mobile Nav */}
                <nav className="bottom-nav">
                    {navItems.map(item => (
                        <button key={item.id} className={`bottom-nav-item ${activeMenu === item.id ? 'active' : ''}`} onClick={() => navTo(item.id)}>
                            <i className={item.fa}></i>
                            <span>{item.label}</span>
                        </button>
                    ))}
                </nav>
            </div>
        );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
