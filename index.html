<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    
    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #FDF8F5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .material-symbols-rounded { font-size: 24px; }
    </style>
</head>
<body class="text-[#2D3748] max-w-md mx-auto relative min-h-screen bg-[#FDF8F5] pb-24">

    <!-- Header & Search -->
    <header class="p-5 pt-8">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold">অ্যাডমিশন ড্যাশবোর্ড</h1>
                <p class="text-gray-500 text-sm">শিক্ষার্থী</p>
            </div>
            <div class="w-12 h-12 bg-orange-200 rounded-full flex items-center justify-center overflow-hidden border-2 border-white shadow-sm">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Profile" class="w-full h-full">
            </div>
        </div>
    </header>

    <!-- Upload Section with Hidden Inputs -->
    <section class="px-5 mb-6 flex gap-3">
        <input type="file" id="routineInput" accept="image/*" class="hidden">
        <input type="file" id="examInput" accept="image/*" class="hidden">

        <button id="uploadRoutineBtn" class="flex-1 flex justify-center items-center gap-1 bg-white border border-[#C57B5C] text-[#C57B5C] py-2 rounded-lg text-sm font-semibold shadow-sm hover:bg-[#FDF8F5] transition">
            <span class="material-symbols-rounded" style="font-size: 18px;">description</span> রুটিন আপলোড
        </button>
        <button id="uploadExamBtn" class="flex-1 flex justify-center items-center gap-1 bg-white border border-[#2ECC71] text-[#2ECC71] py-2 rounded-lg text-sm font-semibold shadow-sm hover:bg-green-50 transition">
            <span class="material-symbols-rounded" style="font-size: 18px;">quiz</span> খাতা অ্যানালাইসিস
        </button>
    </section>

    <!-- AI Loading Modal -->
    <div id="aiLoading" class="hidden fixed inset-0 bg-black bg-opacity-60 z-[90] flex justify-center items-center backdrop-blur-sm">
        <div class="bg-white p-6 rounded-3xl flex flex-col items-center shadow-2xl w-3/4 max-w-xs transform scale-105 transition-all">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-gray-100 border-t-[#C57B5C] mb-4"></div>
            <h3 class="text-lg font-bold text-[#2D3748]">এআই কাজ করছে...</h3>
            <p class="text-sm text-gray-500 text-center mt-1" id="loadingText">ফাইলটি স্ক্যান করা হচ্ছে</p>
        </div>
    </div>

    <!-- Custom Dialog Box / Error Modal -->
    <div id="customDialog" class="hidden fixed inset-0 bg-black bg-opacity-60 z-[100] flex justify-center items-center backdrop-blur-sm">
        <div class="bg-white p-6 rounded-3xl w-11/12 max-w-sm shadow-2xl transform transition-all flex flex-col gap-3">
            <div class="flex items-center gap-3">
                <span id="dialogIcon" class="material-symbols-rounded text-4xl"></span>
                <h3 id="dialogTitle" class="text-xl font-bold">টাইটেল</h3>
            </div>
            <div class="bg-gray-50 p-3 rounded-xl max-h-[50vh] overflow-y-auto no-scrollbar border border-gray-100">
                <p id="dialogMessage" class="text-gray-700 text-sm font-mono whitespace-pre-wrap word-break"></p>
            </div>
            <div class="flex justify-end mt-2">
                <button id="closeDialogBtn" class="bg-[#C57B5C] hover:bg-[#a6654a] text-white px-6 py-2 rounded-xl text-sm font-bold shadow-md transition">ঠিক আছে</button>
            </div>
        </div>
    </div>

    <!-- Timeline Section -->
    <section class="px-5">
        <div class="flex justify-between items-center mb-5">
            <h2 class="text-lg font-bold">আমার টাইমলাইন</h2>
            <button class="bg-[#C57B5C] text-white text-xs px-3 py-1.5 rounded-lg font-semibold shadow-sm">সব দেখুন</button>
        </div>
        <div id="timelineContainer" class="flex flex-col gap-0">
            <!-- Timeline Cards -->
        </div>
    </section>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-100 flex justify-around p-3 pb-5 z-40 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <button class="flex flex-col items-center text-[#C57B5C]">
            <span class="material-symbols-rounded">home</span>
            <span class="text-[10px] mt-1 font-semibold">হোম</span>
        </button>
        <button class="flex flex-col items-center text-gray-400 hover:text-[#C57B5C]">
            <span class="material-symbols-rounded">menu_book</span>
            <span class="text-[10px] mt-1">আমার কোর্স</span>
        </button>
        <button class="flex flex-col items-center text-gray-400 hover:text-[#C57B5C]">
            <span class="material-symbols-rounded">download</span>
            <span class="text-[10px] mt-1">ডাউনলোড</span>
        </button>
        <button class="flex flex-col items-center text-gray-400 hover:text-[#C57B5C]">
            <span class="material-symbols-rounded">notifications</span>
            <span class="text-[10px] mt-1">নোটিফিকেশন</span>
        </button>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
