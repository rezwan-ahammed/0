                    sending: "পাঠানো হচ্ছে...", sent: "বার্তা পাঠানো হয়েছে!"
                }
            };

            const L = (item, key, lang) =>
                (item ? (item[`${key}_${lang}`] || item[`${key}_en`] || item[key] || '') : '');

            const timeAgo = (dateStr) => {
                if (!dateStr) return '';
                const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
                if (diff < 60)    return 'Just now';
                if (diff < 3600)  return `${Math.floor(diff/60)}m ago`;
                if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
                return new Date(dateStr).toLocaleDateString();
            };

            const renderMarkdown = (text) => {
                if (!text) return { __html: '' };
                let h = text
                    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/\n/g,'<br/>');
                h = h.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
                h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
                    '<a href="$2" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:underline font-bold">$1</a>');
                return { __html: h };
            };

            const callGemini = async (prompt, aiContext) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;
                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: aiContext }] }
                        })
                    });
                    const data = await res.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "System error. Try again.";
                } catch(e) { return "// Connection error."; }
            };

            /* ─── COMPONENTS ─────────────────────────────────────────── */

            const Toast = ({ msg, onClose }) => {
                useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, [onClose]);
                return (
                    <div className="toast">
                        <i className="fa-solid fa-circle-check text-green-500"></i> {msg}
                    </div>
                );
            };

            const SelectionModal = ({ title, options, onClose, onSelect }) => (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-box" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-5">
                            <span className="text-lg font-bold font-mono">{title}</span>
                            <button onClick={onClose} className="w-8 h-8 rounded-full bg-white/50 flex items-center justify-center text-slate-500 hover:bg-white">
                                <i className="fa-solid fa-xmark"></i>
                            </button>
                        </div>
                        <div className="flex flex-col gap-3">
                            {options.map((opt, i) => (
                                <button key={i} onClick={() => onSelect(opt.url)}
                                    className="flex items-center gap-4 p-3 bg-white/40 border border-white/60 hover:bg-white/80 rounded-xl transition-all text-left">
                                    <div className="w-10 h-10 rounded-lg bg-white flex items-center justify-center shrink-0 border border-slate-100 shadow-sm">
                                        {/* FIX: icon names are lowercase for font-awesome brands */}
                                        <i className={`fa-brands fa-${opt.icon} text-xl text-blue-600`}></i>
                                    </div>
                                    <div>
                                        <div className="font-bold text-slate-800">{opt.label}</div>
                                        <div className="text-[10px] font-mono uppercase text-slate-500">{opt.sub}</div>
                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const TypingHero = ({ lang, name }) => {
                const roles = lang === 'en'
                    ? ['> builder_', '> educator_', '> thinker_']
                    : ['> নির্মাতা_', '> শিক্ষক_', '> চিন্তাবিদ_'];
                const [idx, setIdx]           = useState(0);
                const [displayed, setDisplayed] = useState('');
                const [deleting, setDeleting]   = useState(false);

                useEffect(() => {
                    const target = roles[idx];
                    if (deleting) {
                        if (displayed.length === 0) { setDeleting(false); setIdx(i => (i+1) % roles.length); return; }
                        const t = setTimeout(() => setDisplayed(d => d.slice(0,-1)), 30);
                        return () => clearTimeout(t);
                    }
                    if (displayed.length < target.length) {
                        const t = setTimeout(() => setDisplayed(target.slice(0, displayed.length+1)), 70);
                        return () => clearTimeout(t);
                    } else {
                        const t = setTimeout(() => setDeleting(true), 2000);
                        return () => clearTimeout(t);
                    }
                }, [displayed, deleting, idx, lang]);

                return (
                    <div className="font-mono text-sm md:text-base text-slate-500 mb-4 tracking-wide">
                        <span className="text-green-500 font-bold">$</span>{' '}
                        <span className="text-blue-600 font-semibold">{displayed}</span>
                        <span className="animate-pulse">_</span>
                    </div>
                );
            };

            const VisitorCounter = () => {
                const [count, setCount] = useState(null);
                useEffect(() => {
                    const sessionKey = 'rz_visited';
                    (async () => {
                        try {
                            const counterRef = dRef('meta','visitors');
                            const snap = await getDoc(counterRef);
                            if (!snap.exists()) {
                                await setDoc(counterRef, { count: 1 });
                                setCount(1);
                            } else {
                                const c = snap.data().count || 0;
                                if (!sessionStorage.getItem(sessionKey)) {
                                    await updateDoc(counterRef, { count: increment(1) });
                                    sessionStorage.setItem(sessionKey, '1');
                                    setCount(c + 1);
                                } else { setCount(c); }
                            }
                        } catch(_) {}
                    })();
                }, []);
                if (count === null) return null;
                return (
                    <div className="text-[10px] font-mono text-slate-400 mt-4 uppercase tracking-widest border border-slate-200/60 bg-white/40 py-1.5 px-3 rounded-full mx-auto w-fit">
                        <i className="fa-solid fa-eye mr-1"></i> {count.toLocaleString()} Visitors
                    </div>
                );
            };

            const PostCard = ({ p, user, lang, currentName, currentAvatar, onLike, onAddComment, setToast }) => {
                const [showComments, setShowComments] = useState(false);
                const [commentText, setCommentText]   = useState('');
                const [guestName, setGuestName]       = useState('');
                const [showNameInput, setShowNameInput] = useState(false);

                const isLiked   = (p.likedBy||[]).includes(user?.uid);
                const likeCount = (p.likedBy||[]).length;
                const comments  = p.comments || [];

                const handleComment = () => {
                    if (!commentText.trim()) return;
                    if (!guestName.trim()) { setShowNameInput(true); return; }
                    onAddComment(p.id, commentText, guestName);
                    setCommentText(''); setShowNameInput(false);
                };

                const handleShare = () => {
                    const url = window.location.href;
                    if (navigator.share) {
                        navigator.share({ title:`${currentName}'s Post`, text: p.content, url }).catch(()=>{});
                    } else {
                        navigator.clipboard.writeText(url)
                            .then(() => setToast("Link copied to clipboard!")).catch(()=>{});
                    }
                };

                return (
                    <div className="card p-0 mb-6">
                        <div className="p-5 pb-2">
                            <div className="flex justify-between items-start mb-4">
                                <div className="flex items-center gap-3">
                                    {/* FIX: Added alt attribute */}
                                    <img src={currentAvatar} alt={currentName}
                                        className="w-12 h-12 rounded-full border-2 border-white shadow-sm object-cover" />
                                    <div>
                                        <div className="font-bold text-slate-800">{currentName}</div>
                                        <div className="text-xs text-slate-500 font-mono mt-0.5">{timeAgo(p.timestamp)}</div>
                                    </div>
                                </div>
                                <span className="pill pill-blue"><i className="fa-solid fa-terminal mr-1"></i> Update</span>
                            </div>

                            <div className="text-[15px] text-slate-700 leading-relaxed mb-4"
                                dangerouslySetInnerHTML={renderMarkdown(p.content)} />

                            {p.imageUrl && <img src={p.imageUrl} alt="Post" className="post-image mb-4" />}

                            {(likeCount > 0 || comments.length > 0) && (
                                <div className="flex justify-between items-center text-xs text-slate-500 font-bold mb-3 px-1">
                                    {likeCount > 0
                                        ? <span className="flex items-center gap-1.5">
                                            <div className="w-4 h-4 rounded-full bg-blue-500 text-white flex items-center justify-center text-[8px]">
                                                <i className="fa-solid fa-thumbs-up"></i>
                                            </div> {likeCount}
                                          </span>
                                        : <span></span>
                                    }
                                    {comments.length > 0 &&
                                        <button onClick={()=>setShowComments(!showComments)} className="hover:underline">
                                            {comments.length} comments
                                        </button>
                                    }
                                </div>
                            )}
                        </div>

                        {/* FIX: .divider class now properly defined in CSS */}
                        <div className="divider"></div>

                        <div className="flex px-2 py-1.5 bg-white/20">
                            <button className={`post-action ${isLiked?'liked':''}`} onClick={() => onLike(p.id, p.likedBy)}>
                                <i className={`${isLiked?'fa-solid':'fa-regular'} fa-thumbs-up text-lg`}></i> Like
                            </button>
                            <button className="post-action" onClick={() => setShowComments(!showComments)}>
                                <i className="fa-regular fa-comment-dots text-lg"></i> Comment
                            </button>
                            <button className="post-action" onClick={handleShare}>
                                <i className="fa-solid fa-share-nodes text-lg"></i> Share
                            </button>
                        </div>

                        {showComments && (
                            <div className="p-4 bg-white/40 border-t border-slate-200/50">
                                {comments.length > 0 && (
                                    <div className="flex flex-col gap-3 mb-4">
                                        {comments.map((c,i) => (
                                            <div key={i} className="flex items-start gap-2">
                                                <div className="w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-xs font-bold shrink-0">
                                                    {(c.name||'?')[0].toUpperCase()}
                                                </div>
                                                <div className="bg-white/60 border border-white/80 p-2.5 rounded-xl rounded-tl-sm text-sm text-slate-700">
                                                    <span className="font-bold text-blue-600 block text-xs mb-0.5">{c.name}</span>
                                                    {c.text_en}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {showNameInput &&
                                    <input value={guestName} onChange={e=>setGuestName(e.target.value)}
                                        placeholder="Enter your name to post..."
                                        className="glass-input mb-2 text-sm"
                                        style={{padding:'8px 14px'}}
                                        onKeyDown={e=>e.key==='Enter'&&handleComment()}
                                        autoFocus />
                                }
                                <div className="flex gap-2 mt-2">
                                    <input value={commentText}
                                        onChange={e=>setCommentText(e.target.value)}
                                        onKeyDown={e=>e.key==='Enter'&&handleComment()}
                                        placeholder="Write a comment..."
                                        className="glass-input text-sm"
                                        style={{padding:'8px 14px', borderRadius:'100px'}} />
                                    <button onClick={handleComment}
                                        className="w-10 h-10 rounded-full bg-blue-600 text-white shrink-0 flex items-center justify-center">
                                        <i className="fa-solid fa-paper-plane text-xs"></i>
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            };

            /* ── AI Resume Matcher ── */
            const AIResumeMatcher = ({ t, profileData, skills }) => {
                const [jd, setJd]         = useState('');
                const [result, setResult] = useState('');
                const [loading, setLoading] = useState(false);
                const [open, setOpen]     = useState(false);

                const run = async () => {
                    if (!jd.trim()) return;
                    setLoading(true); setResult('');
                    const skillStr = skills.map(s => (s.items||[]).map(i=>i.name).join(', ')).join(', ');
                    const ctx = `You are an AI recruiter. Analyze the job description against this candidate. Be honest, highlight strengths and note gaps. Output markdown. Candidate: ${profileData?.name_en}. Bio: ${profileData?.bio_en}. Skills: ${skillStr}.`;
                    const r = await callGemini(`Analyze this Job Description:\n${jd}`, ctx);
                    setResult(r); setLoading(false);
                };

                return (
                    <div className="bg-blue-50/50 border border-dashed border-blue-300 rounded-xl p-5 hover:bg-blue-50 transition-colors mt-6">
                        <div className="flex items-center justify-between cursor-pointer" onClick={()=>setOpen(!open)}>
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center">
                                    <i className="fa-solid fa-wand-magic-sparkles"></i>
                                </div>
                                <div>
                                    <h3 className="font-bold text-slate-800 font-mono text-sm">{t.aiResumeTitle}</h3>
                                    <p className="text-xs text-slate-500">Gemini 2.0 Analysis</p>
                                </div>
                            </div>
                            <i className={`fa-solid fa-chevron-${open?'up':'down'} text-slate-400`}></i>
                        </div>
                        {open && (
                            <div className="mt-4 pt-4 border-t border-blue-200/50 flex flex-col gap-3 animate-fade-up">
                                <p className="text-xs text-slate-600 font-mono">{t.aiResumePrompt}</p>
                                <textarea value={jd} onChange={e=>setJd(e.target.value)}
                                    placeholder="Paste JD here..." className="glass-input text-xs" rows="4" />
                                <button onClick={run} disabled={loading||!jd.trim()}
                                    className="btn-primary w-fit text-xs px-4 py-2"
                                    style={{opacity: (loading||!jd.trim()) ? 0.6 : 1}}>
                                    {loading
                                        ? <><i className="fa-solid fa-spinner fa-spin"></i> Processing...</>
                                        : "Run Analysis"
                                    }
                                </button>
                                {result &&
                                    <div className="mt-4 p-4 bg-white/80 rounded-xl border border-white text-sm text-slate-700 leading-relaxed shadow-sm"
                                        dangerouslySetInnerHTML={renderMarkdown(result)} />
                                }
                            </div>
                        )}
                    </div>
                );
            };

            /* ── Contact Form (was referenced but never defined) ── */
            const ContactForm = ({ t, profileData }) => {
                const [form, setForm]       = useState({ name:'', email:'', message:'' });
                const [status, setStatus]   = useState('idle'); // idle | sending | sent | error

                const handleChange = (e) => setForm(f => ({...f, [e.target.name]: e.target.value}));

                const handleSubmit = async () => {
                    if (!form.name.trim() || !form.message.trim()) return;
                    setStatus('sending');
                    try {
                        await addDoc(col('contact_messages'), {
                            ...form, timestamp: new Date().toISOString()
                        });
                        setStatus('sent');
                        setForm({ name:'', email:'', message:'' });
                        setTimeout(() => setStatus('idle'), 4000);
                    } catch(e) {
                        setStatus('error');
                        setTimeout(() => setStatus('idle'), 3000);
                    }
                };

                if (status === 'sent') {
                    return (
                        <div className="flex flex-col items-center gap-3 py-8 text-center animate-fade-up">
                            <div className="w-14 h-14 rounded-full bg-green-100 flex items-center justify-center text-green-600 text-2xl">
                                <i className="fa-solid fa-check"></i>
                            </div>
                            <p className="font-bold text-slate-700">{t.sent}</p>
                            <p className="text-sm text-slate-500 font-mono">I'll get back to you soon.</p>
                        </div>
                    );
                }

                return (
                    <div className="contact-form-row">
                        <input name="name" value={form.name} onChange={handleChange}
                            placeholder={t.yourName} className="glass-input" />
                        <input name="email" value={form.email} onChange={handleChange}
                            placeholder={t.yourEmail} type="email" className="glass-input" />
                        <textarea name="message" value={form.message} onChange={handleChange}
                            placeholder={t.yourMessage} className="glass-input" rows="4" />
                        <button onClick={handleSubmit}
                            disabled={status==='sending' || !form.name.trim() || !form.message.trim()}
                            className="btn-primary w-full"
                            style={{opacity: (status==='sending'||!form.name.trim()||!form.message.trim()) ? 0.6 : 1}}>
                            {status === 'sending'
                                ? <><i className="fa-solid fa-spinner fa-spin"></i> {t.sending}</>
                                : <><i className="fa-solid fa-paper-plane"></i> {t.sendMessage}</>
                            }
                        </button>
                        {status === 'error' &&
                            <p className="text-xs text-red-500 font-mono text-center">// Send failed. Check connection.</p>
                        }
                    </div>
                );
            };

            /* ─── MAIN APP ───────────────────────────────────────────── */
            const App = () => {
                const [lang, setLang]           = useState('en');
                const t = T[lang];
                const [activeMenu, setActiveMenu] = useState('Home');
                const [sidebarOpen, setSidebarOpen] = useState(false);
                const [isLoading, setIsLoading]   = useState(true);
                const [user, setUser]             = useState(null);

                const [activeModal, setActiveModal] = useState(null);
                const [toast, setToast]             = useState(null);

                const [posts, setPosts]             = useState([]);
                const [projects, setProjects]       = useState([]);
                const [academics, setAcademics]     = useState([]);
                const [perspectives, setPerspectives] = useState([]);
                const [skills, setSkills]           = useState([]);
                const [profileData, setProfileData] = useState(null);

                useEffect(() => {
                    signInAnonymously(fbAuth);
                    const unsub = onAuthStateChanged(fbAuth, u => setUser(u));

                    const subs = [
                        onSnapshot(col('posts'),        s => setPosts(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)))),
                        onSnapshot(col('projects'),     s => setProjects(s.docs.map(x=>({id:x.id,...x.data()})))),
                        onSnapshot(col('academics'),    s => setAcademics(s.docs.map(x=>({id:x.id,...x.data()})))),
                        onSnapshot(col('perspectives'), s => setPerspectives(s.docs.map(x=>({id:x.id,...x.data()})).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)))),
                        onSnapshot(col('skills'),       s => setSkills(s.docs.map(x=>({id:x.id,...x.data()})))),
                        onSnapshot(col('profile'),      s => {
                            setProfileData(s.empty ? MINIMAL_PROFILE_FALLBACK : s.docs[0].data());
                            // FIX: isLoading ends when profile fires — this is correct since profile
                            // is the most critical piece. Other collections update reactively.
                            setIsLoading(false);
                        })
                    ];
                    return () => { unsub(); subs.forEach(f=>f()); };
                }, []);

                const resolvedProfile = profileData || MINIMAL_PROFILE_FALLBACK;
                const currentName   = L(resolvedProfile,'name',lang)  || 'System Admin';
                const currentRole   = L(resolvedProfile,'role',lang)  || 'Role Unassigned';
                const currentBio    = L(resolvedProfile,'bio',lang)   || '';
                // FIX: DEFAULT_AVATAR is now properly defined above
                const currentAvatar = resolvedProfile.avatar          || DEFAULT_AVATAR;
                const activeMissions = academics.filter(a => a.type === 'current' && a.active);

                const navItems = [
                    { id:'Home',         fa:'fa-solid fa-terminal',       labelKey:'home',         subKey:'homeLabel' },
                    { id:'Profile',      fa:'fa-solid fa-user',           labelKey:'profile',      subKey:'profileLabel' },
                    { id:'Projects',     fa:'fa-solid fa-layer-group',    labelKey:'portfolio',    subKey:'portfolioLabel' },
                    { id:'Academics',    fa:'fa-solid fa-graduation-cap', labelKey:'academics',    subKey:'academicsLabel' },
                    { id:'Perspectives', fa:'fa-solid fa-quote-left',     labelKey:'perspectives', subKey:'perspectivesLabel' }
                ];

                const navTo = (id) => { setActiveMenu(id); setSidebarOpen(false); window.scrollTo(0,0); };

                const toggleLike = async (id, likedBy) => {
                    if (!user) return;
                    const isLiked = (likedBy||[]).includes(user.uid);
                    await updateDoc(dRef('posts',id), {
                        likedBy: isLiked ? arrayRemove(user.uid) : arrayUnion(user.uid)
                    });
                };

                const addComment = async (id, text, guestName) => {
                    if (!user) return;
                    const commentObj = { text_en:text, name:guestName, userId:user.uid, timestamp:new Date().toISOString() };
                    await updateDoc(dRef('posts',id), { comments: arrayUnion(commentObj) });
                };

                // FIX: icon names are lowercase for font-awesome brands
                const followOptions = [
                    { label:'Facebook',  sub:'Social',       icon:'facebook-f',   url:resolvedProfile.facebookUrl },
                    { label:'LinkedIn',  sub:'Professional', icon:'linkedin-in',  url:resolvedProfile.linkedinUrl }
                ].filter(o => o.url);

                const messageOptions = [
                    { label:'Messenger', sub:'Chat',         icon:'facebook-messenger', url:resolvedProfile.messengerUrl }
                ].filter(o => o.url);

                // Apply language class to body
                useEffect(() => {
                    document.body.classList.toggle('lang-bn', lang === 'bn');
                }, [lang]);

                return (
                    <div style={{ minHeight:'100vh', position:'relative', zIndex:1 }}>
                        {toast && <Toast msg={toast} onClose={() => setToast(null)} />}

                        {activeModal==='follow' && followOptions.length > 0 &&
                            <SelectionModal title={t.follow} options={followOptions}
                                onClose={()=>setActiveModal(null)}
                                onSelect={u=>{ u?window.open(u,'_blank'):setToast("Link not configured"); setActiveModal(null); }} />
                        }
                        {activeModal==='message' && messageOptions.length > 0 &&
                            <SelectionModal title={t.message} options={messageOptions}
                                onClose={()=>setActiveModal(null)}
                                onSelect={u=>{ u?window.open(u,'_blank'):setToast("Link not configured"); setActiveModal(null); }} />
                        }

                        <div className={'sidebar-overlay'+(sidebarOpen?' show':'')} onClick={()=>setSidebarOpen(false)}></div>

                        {/* ── SIDEBAR ── */}
                        <aside className={sidebarOpen?'open':''}>
                            <div className="p-8 text-center border-b border-white/20">
                                {/* FIX: Added alt attribute */}
                                <img src={currentAvatar} alt={currentName}
                                    className="w-24 h-24 rounded-full object-cover border-4 border-white/90 mx-auto mb-4 shadow-xl" />
                                <div className="font-bold text-xl text-slate-800 mb-1">{currentName}</div>
                                <div className="text-xs text-blue-600 font-bold font-mono uppercase tracking-widest mb-4">{currentRole}</div>
                                {resolvedProfile.available && (
                                    <div className="pill pill-green mx-auto mb-2">
                                        <div className="avail-dot"></div>
                                        {L(resolvedProfile,'availableText',lang) || t.available}
                                    </div>
                                )}
                                <VisitorCounter />
                            </div>

                            <nav className="flex-1 p-5 flex flex-col gap-3 overflow-y-auto">
                                {navItems.map(item => (
                                    <button key={item.id}
                                        className={'nav-item'+(activeMenu===item.id?' active':'')}
                                        onClick={()=>navTo(item.id)}>
                                        <i className={item.fa} style={{ width:24, textAlign:'center', fontSize:'16px' }}></i>
                                        <div>
                                            <div className="nav-label-main">{t[item.labelKey]}</div>
                                            <div className="nav-label-sub">{t[item.subKey]}</div>
                                        </div>
                                    </button>
                                ))}
                            </nav>
                        </aside>

                        <div className="main-wrapper flex flex-col min-h-screen">
                            {/* ── TOP HEADER ── */}
                            <header className="sticky top-0 h-16 z-40 flex items-center px-4 md:px-8 gap-4 justify-between">
                                <div className="flex items-center gap-4">
                                    <button onClick={()=>setSidebarOpen(true)}
                                        className="lg:hidden w-10 h-10 rounded-xl bg-white/40 border border-white/40 flex items-center justify-center">
                                        <i className="fa-solid fa-bars"></i>
                                    </button>
                                    <span className="font-bold text-slate-600 font-mono text-sm">
                                        {t[navItems.find(n=>n.id===activeMenu)?.labelKey] || activeMenu}
                                    </span>
                                </div>
                                {/* FIX: .lang-toggle class is now properly defined in CSS */}
                                <button className="lang-toggle" onClick={()=>setLang(lang==='en'?'bn':'en')}>
                                    <i className="fa-solid fa-language text-blue-500 mr-2"></i>
                                    {lang==='en'?'বাংলা':'English'}
                                </button>
                            </header>

                            <main className="flex-1 max-w-3xl w-full mx-auto p-4 md:p-8 pb-24">
                                {isLoading ? (
                                    <div className="text-center mt-32">
                                        <i className="fa-solid fa-circle-notch fa-spin text-4xl text-blue-500 mb-4 block"></i>
                                        <span className="font-mono text-sm text-slate-500 uppercase tracking-widest">Compiling Assets...</span>
                                    </div>
                                ) : activeMenu === 'Home' ? (
                                    <div className="animate-fade-up flex flex-col gap-8">
                                        {/* Hero Card */}
                                        <div className="card p-8 md:p-10 flex flex-col md:flex-row items-center gap-8">
                                            <div className="flex-1 text-center md:text-left">
                                                <TypingHero lang={lang} name={currentName} />
                                                <h1 className="text-4xl md:text-5xl font-extrabold leading-tight mb-5 text-slate-800">
                                                    {lang==='en'
                                                        ? <>Hey, I'm <br/>
                                                            <span className="bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600">{currentName}</span>.
                                                          </>
                                                        : currentName
                                                    }
                                                </h1>
                                                <p className="text-slate-600 leading-relaxed mb-6">{currentBio}</p>
                                                <div className="flex flex-wrap gap-4 justify-center md:justify-start">
                                                    <button className="btn-primary" onClick={()=>setActiveModal('follow')}>
                                                        <i className="fa-solid fa-user-plus"></i> {t.follow}
                                                    </button>
                                                    <button className="btn-ghost" onClick={()=>setActiveModal('message')}>
                                                        <i className="fa-regular fa-comment-dots"></i> {t.message}
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="hidden md:block w-40 h-40 rounded-full overflow-hidden border-8 border-white shadow-xl shrink-0 rotate-3 hover:rotate-0 transition-transform duration-500">
                                                {/* FIX: Added alt attribute */}
                                                <img src={currentAvatar} alt={currentName} className="w-full h-full object-cover" />
                                            </div>
                                        </div>

                                        {/* Current Missions */}
                                        {activeMissions.length > 0 && (
                                            <div className="card p-6 border-l-4 border-l-blue-500">
                                                <div className="font-mono text-xs font-bold text-blue-500 mb-4 uppercase tracking-widest flex items-center gap-2">
                                                    <i className="fa-solid fa-bolt text-amber-400"></i> Currently Executing
                                                </div>
                                                <div className="grid grid-cols-1 gap-4">
                                                    {activeMissions.map(m => (
                                                        <div key={m.id} className="exec-card">
                                                            <div className="flex justify-between items-center mb-2">
                                                                <div className="font-bold text-slate-800">{L(m,'subject',lang)}</div>
                                                                <div className="text-blue-600 font-mono font-bold text-xs bg-blue-50 px-2 py-1 rounded-md">{m.progress}%</div>
                                                            </div>
                                                            <div className="text-xs text-slate-500 mb-3">{L(m,'goal',lang)}</div>
                                                            <div className="progress-track">
                                                                <div className="progress-fill" style={{width:`${m.progress}%`}}></div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        <div className="flex items-center gap-4 py-2">
                                            {/* FIX: t.recentUpdates is now defined in translations */}
                                            <span className="font-mono text-xs font-bold text-slate-400 uppercase tracking-widest bg-white/50 px-3 py-1 rounded-full border border-slate-200">
                                                <i className="fa-solid fa-rss mr-2"></i>{t.recentUpdates}
                                            </span>
                                            <div className="flex-1 h-px bg-gradient-to-r from-slate-200 to-transparent"></div>
                                        </div>

                                        {posts.length === 0
                                            ? <div className="text-center p-12 font-mono text-slate-400 border border-dashed border-slate-300 rounded-2xl bg-white/20">
                                                <i className="fa-solid fa-satellite-dish text-4xl block mb-4 opacity-50"></i>{t.emptyFeed}
                                              </div>
                                            : <div className="flex flex-col gap-6">
                                                {posts.map(p =>
                                                    <PostCard key={p.id} p={p} user={user} lang={lang}
                                                        currentName={currentName} currentAvatar={currentAvatar}
                                                        onLike={toggleLike} onAddComment={addComment} setToast={setToast} />
                                                )}
                                              </div>
                                        }
                                    </div>

                                ) : activeMenu === 'Projects' ? (
                                    <div className="animate-fade-up">
                                        <h2 className="text-4xl font-extrabold mb-8 text-slate-800 tracking-tight">{t.portfolioLabel}</h2>
                                        {projects.length === 0
                                            ? <div className="text-center p-12 font-mono text-slate-400 border border-dashed border-slate-300 rounded-2xl bg-white/20">
                                                <i className="fa-solid fa-folder-open text-4xl block mb-4 opacity-50"></i>{t.emptyProjects}
                                              </div>
                                            : <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                {[...projects].sort((a,b)=>b.featured-a.featured).map(p => (
                                                    <div key={p.id} className={`card p-6 flex flex-col group ${p.featured?'border-l-4 border-l-blue-500':''}`}>
                                                        {p.imageUrl &&
                                                            <div className="overflow-hidden rounded-xl mb-5 border border-white/60">
                                                                {/* FIX: Added alt attribute */}
                                                                <img src={p.imageUrl} alt={L(p,'title',lang)}
                                                                    className="w-full h-40 object-cover transform group-hover:scale-105 transition-transform duration-500" />
                                                            </div>
                                                        }
                                                        <div className="flex justify-between items-start mb-3 gap-2 flex-wrap">
                                                            <h3 className="font-bold text-xl text-slate-800">{L(p,'title',lang)}</h3>
                                                            {p.status === 'live'
                                                                ? <span className="pill pill-green"><div className="status-dot-live mr-1"></div> Live</span>
                                                                : <span className="pill pill-gold"><div className="status-dot-dev mr-1"></div> Dev</span>
                                                            }
                                                        </div>
                                                        <p className="text-[15px] text-slate-600 leading-relaxed mb-6 flex-1">{L(p,'desc',lang)}</p>
                                                        <div className="flex flex-wrap gap-2 mb-6">
                                                            {(p.tech||[]).map((tech,i) => <span key={i} className="tech-tag">{tech}</span>)}
                                                        </div>
                                                        <div className="pt-4 border-t border-slate-200/60 flex justify-between items-center">
                                                            {p.featured && <span className="text-blue-500 text-xs font-bold uppercase tracking-widest font-mono"><i className="fa-solid fa-star mr-1"></i> Featured</span>}
                                                            <div className="flex-1"></div>
                                                            {p.url &&
                                                                <a href={p.url} target="_blank" rel="noopener noreferrer"
                                                                    className="btn-ghost"
                                                                    style={{padding:'8px 16px', fontSize:'12px', background:'rgba(239,246,255,1)', color:'#2563eb', borderColor:'#bfdbfe'}}>
                                                                    <i className="fa-solid fa-arrow-up-right-from-square"></i> Launch
                                                                </a>
                                                            }
                                                        </div>
                                                    </div>
                                                ))}
                                              </div>
                                        }
                                    </div>

                                ) : activeMenu === 'Academics' ? (
                                    <div className="animate-fade-up">
                                        <h2 className="text-4xl font-extrabold mb-8 text-slate-800 tracking-tight">{t.academicsLabel}</h2>
                                        {academics.length === 0
                                            ? <div className="text-center p-12 font-mono text-slate-400 border border-dashed border-slate-300 rounded-2xl bg-white/20">
                                                <i className="fa-solid fa-graduation-cap text-4xl block mb-4 opacity-50"></i>
                                                <pre style={{fontFamily:'inherit'}}>{t.emptyAcademics}</pre>
                                              </div>
                                            : <div className="flex flex-col gap-6">
                                                {[...academics].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(a => {
                                                    const isRes = a.type === 'result';
                                                    const isLog = a.type === 'studylog';
                                                    const isCur = a.type === 'current';
                                                    const moodEmojis = { focused:'🎯', tired:'😴', excited:'🚀', grinding:'💪' };
                                                    return (
                                                        <div key={a.id} className={`card p-6 border-l-4 ${isRes?'border-l-amber-500':isLog?'border-l-blue-500':'border-l-green-500'}`}>
                                                            <div className="flex justify-between items-start mb-3 flex-wrap gap-2">
                                                                <div className="flex gap-2 items-center flex-wrap">
                                                                    <span className={isRes?'pill pill-gold':isLog?'pill pill-blue':'pill pill-green'}>
                                                                        <i className={`fa-solid ${isRes?'fa-trophy':isLog?'fa-book-open':'fa-bolt'} mr-1`}></i> {a.type}
                                                                    </span>
                                                                    {isRes && a.category && <span className="pill" style={{background:'#f1f5f9',color:'#64748b',border:'1px solid #cbd5e1'}}>{a.category}</span>}
                                                                    {isLog && a.subject_en && <span className="text-xs font-bold text-blue-600 font-mono tracking-wide">{L(a,'subject',lang)}</span>}
                                                                </div>
                                                                {a.timestamp && <span className="text-xs text-slate-400 font-mono">{timeAgo(a.timestamp)}</span>}
                                                            </div>
                                                            <h3 className="font-bold text-xl text-slate-800 mb-2">{L(a,'title',lang)}</h3>
                                                            {isRes && (
                                                                <div className="flex items-center gap-3 text-sm text-slate-600 font-bold mb-2">
                                                                    <i className="fa-solid fa-building-columns text-slate-400"></i>
                                                                    {L(a,'institution',lang)}
                                                                    <span className="text-slate-300">|</span>
                                                                    <span className="text-amber-600 bg-amber-50 px-2 py-0.5 rounded border border-amber-200">{a.grade}</span>
                                                                </div>
                                                            )}
                                                            {(isLog||isCur||(isRes&&a.body_en)) &&
                                                                <p className="text-[15px] text-slate-600 leading-relaxed mb-3">{L(a,'body',lang)||L(a,'goal',lang)}</p>
                                                            }
                                                            {isLog && (
                                                                <div className="flex gap-3 mt-4 pt-4 border-t border-slate-200/50 flex-wrap">
                                                                    {a.mood && <span className="text-xs font-bold bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full border border-slate-200">{moodEmojis[a.mood]||'🧠'} {a.mood}</span>}
                                                                    {a.duration_minutes && <span className="text-xs font-mono font-bold text-slate-500 flex items-center gap-1.5"><i className="fa-solid fa-stopwatch"></i> {a.duration_minutes} mins</span>}
                                                                </div>
                                                            )}
                                                            {isCur && (
                                                                <div className="mt-4 pt-4 border-t border-slate-200/50">
                                                                    <div className="flex justify-between text-xs font-bold font-mono text-slate-500 mb-1">
                                                                        <span>Progress</span>
                                                                        <span className="text-green-600">{a.progress}%</span>
                                                                    </div>
                                                                    <div className="progress-track">
                                                                        <div className="progress-fill" style={{width:`${a.progress}%`, background:'linear-gradient(90deg,#34d399,#059669)'}}></div>
                                                                    </div>
                                                                </div>
                                                            )}
                                                            {/* FIX: Added alt attribute */}
                                                            {a.imageUrl && <img src={a.imageUrl} alt={L(a,'title',lang)} className="w-full max-h-64 object-cover rounded-xl mt-4 border border-slate-200 shadow-sm" />}
                                                        </div>
                                                    );
                                                })}
                                              </div>
                                        }
                                    </div>

                                ) : activeMenu === 'Perspectives' ? (
                                    <div className="animate-fade-up">
                                        <h2 className="text-4xl font-extrabold mb-8 text-slate-800 tracking-tight">{t.perspectivesLabel}</h2>
                                        {perspectives.length === 0
                                            ? <div className="text-center p-12 font-mono text-slate-400 border border-dashed border-slate-300 rounded-2xl bg-white/20">
                                                <i className="fa-solid fa-code-commit text-4xl block mb-4 opacity-50"></i>{t.emptyPerspectives}
                                              </div>
                                            : <div className="flex flex-col gap-6">
                                                {perspectives.map((p, i) => {
                                                    const colors = ['border-l-blue-500','border-l-amber-500','border-l-purple-500','border-l-green-500'];
                                                    return (
                                                        <div key={p.id} className={`card overflow-hidden border-l-4 ${colors[i%colors.length]}`}>
                                                            <div className="bg-white/40 p-3 border-b border-white/60 flex justify-between items-center text-[11px] font-mono font-bold text-slate-500 uppercase tracking-widest">
                                                                <span className="flex items-center gap-2">
                                                                    <i className="fa-solid fa-code-branch"></i> commit {p.id.slice(0,7)}
                                                                </span>
                                                                <span>{timeAgo(p.timestamp)}</span>
                                                            </div>
                                                            <div className="p-8">
                                                                <p className="text-xl md:text-2xl font-sans text-slate-800 leading-relaxed relative z-10">
                                                                    <span className="text-6xl text-slate-200 absolute -top-4 -left-4 -z-10 font-serif">"</span>
                                                                    {L(p,'text',lang)}
                                                                </p>
                                                                {p.topic_en &&
                                                                    <div className="mt-6 pt-4 border-t border-slate-200/50 flex items-center gap-2">
                                                                        <span className="pill" style={{background:'#f1f5f9',color:'#64748b',border:'1px solid #cbd5e1'}}>#{p.topic_en}</span>
                                                                    </div>
                                                                }
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                              </div>
                                        }
                                    </div>

                                ) : activeMenu === 'Profile' ? (
                                    <div className="animate-fade-up flex flex-col gap-8">
                                        <div className="card overflow-hidden shadow-lg">
                                            <div className="fb-cover">
                                                {resolvedProfile.coverPhoto &&
                                                    <img src={resolvedProfile.coverPhoto} alt="Cover"
                                                        className="w-full h-full object-cover absolute inset-0" />
                                                }
                                            </div>
                                            <div className="fb-avatar-wrap">
                                                {/* FIX: Added alt attribute */}
                                                <img src={currentAvatar} alt={currentName} className="fb-avatar bg-white" />
                                            </div>
                                            <div className="fb-profile-body">
                                                <div className="flex justify-between items-start flex-wrap gap-4 mb-2">
                                                    <div>
                                                        <h2 className="text-3xl font-extrabold text-slate-800">{currentName}</h2>
                                                        <p className="text-sm text-blue-600 font-bold font-mono tracking-widest uppercase mt-1">{currentRole}</p>
                                                    </div>
                                                    <div className="flex gap-2">
                                                        {resolvedProfile.resumeUrl &&
                                                            <a href={resolvedProfile.resumeUrl} target="_blank" rel="noopener noreferrer"
                                                                className="btn-primary" style={{padding:'8px 16px', fontSize:'12px'}}>
                                                                <i className="fa-solid fa-download"></i> Resume
                                                            </a>
                                                        }
                                                    </div>
                                                </div>
                                                <p className="text-base text-slate-600 leading-relaxed max-w-2xl mt-4">{currentBio}</p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 gap-6">
                                            <div className="card p-6 md:p-8">
                                                {/* FIX: t.skills is now defined in translations */}
                                                <h3 className="font-bold text-xl mb-6 text-slate-800 border-b border-slate-200/60 pb-3">
                                                    <i className="fa-solid fa-code text-blue-500 mr-2"></i> {t.skills}
                                                </h3>
                                                {/* FIX: t.emptySkills is now defined in translations */}
                                                {skills.length === 0
                                                    ? <p className="text-sm font-mono text-slate-400">{t.emptySkills}</p>
                                                    : skills.map(cat => (
                                                        <div key={cat.id} className="mb-6 last:mb-0">
                                                            <div className="font-bold text-xs text-slate-500 mb-3 uppercase font-mono tracking-wider">
                                                                <i className={`${cat.icon} mr-2`}></i>{L(cat,'cat',lang)}
                                                            </div>
                                                            <div className="flex flex-wrap gap-2">
                                                                {/* FIX: .skill-chip class is now properly defined in CSS */}
                                                                {(cat.items||[]).map((sk,i) => <span key={i} className="skill-chip">{sk.name}</span>)}
                                                            </div>
                                                        </div>
                                                    ))
                                                }
                                                <AIResumeMatcher t={t} profileData={resolvedProfile} skills={skills} />
                                            </div>

                                            <div className="card p-6 md:p-8">
                                                {/* FIX: t.contactTitle is now defined in translations */}
                                                <h3 className="font-bold text-xl mb-6 text-slate-800 border-b border-slate-200/60 pb-3">
                                                    <i className="fa-solid fa-satellite-dish text-green-500 mr-2"></i> {t.contactTitle}
                                                </h3>
                                                <div className="flex justify-center gap-4 mb-6">
                                                    {resolvedProfile.facebookUrl &&
                                                        <a href={resolvedProfile.facebookUrl} target="_blank" rel="noopener noreferrer"
                                                            className="social-btn" style={{width:48, height:48, fontSize:'1.25rem'}}>
                                                            <i className="fa-brands fa-facebook-f"></i>
                                                        </a>
                                                    }
                                                    {resolvedProfile.githubUrl &&
                                                        <a href={resolvedProfile.githubUrl} target="_blank" rel="noopener noreferrer"
                                                            className="social-btn" style={{width:48, height:48, fontSize:'1.25rem'}}>
                                                            <i className="fa-brands fa-github"></i>
                                                        </a>
                                                    }
                                                    {resolvedProfile.linkedinUrl &&
                                                        <a href={resolvedProfile.linkedinUrl} target="_blank" rel="noopener noreferrer"
                                                            className="social-btn" style={{width:48, height:48, fontSize:'1.25rem'}}>
                                                            <i className="fa-brands fa-linkedin-in"></i>
                                                        </a>
                                                    }
                                                </div>
                                                {/* FIX: ContactForm is now properly defined above */}
                                                <ContactForm t={t} profileData={resolvedProfile} />
                                            </div>
                                        </div>
                                    </div>
                                ) : null}
                            </main>
                        </div>

                        {/* ── MOBILE BOTTOM NAV ── */}
                        <nav className="bottom-nav">
                            {navItems.map(item => (
                                /* FIX: mb:2 was wrong JSX-object syntax for icon style; fixed to proper style */
                                <button key={item.id}
                                    className={'bottom-nav-item'+(activeMenu===item.id?' active':'')}
                                    onClick={()=>navTo(item.id)}>
                                    <i className={item.fa} style={{ fontSize:18 }}></i>
                                    <span>{t[item.labelKey].replace('~/','')}</span>
                                </button>
                            ))}
                        </nav>
                    </div>
                );
            };

            ReactDOM.createRoot(document.getElementById('root')).render(<App />);

        } catch (error) {
            console.error('RezwanOS Boot Error:', error);
            document.getElementById('root').innerHTML = `
                <div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:monospace;color:#ef4444;text-align:center;padding:20px;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:16px;opacity:0.7"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    <div style="font-size:14px;color:#94a3b8;margin-top:8px;">Fatal Boot Error — Check Console</div>
                    <div style="font-size:11px;color:#cbd5e1;margin-top:8px;max-width:300px;word-break:break-all;">${error.message||''}</div>
                </div>`;
        }
    }

    bootPortfolio();
</script>
</body>
</html>
