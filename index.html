<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Maintenance | Janani Coaching Centre</title>
    
    <style>
        :root {
            --jcc-emerald: #00695c;
            --jcc-green: #2e7d32;
            --jcc-glass: rgba(255, 255, 255, 0.45);
            --jcc-border: rgba(255, 255, 255, 0.4);
            --jcc-shadow: 0 20px 50px rgba(0, 77, 64, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: linear-gradient(135deg, #e0f2f1 0%, #c8e6c9 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: #1a2a26;
            overflow: hidden;
        }

        /* High-end Glassmorphism with Noise */
        .jcc-maintenance-wrapper {
            position: relative;
            max-width: 480px;
            width: 100%;
            background: var(--jcc-glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1.5px solid var(--jcc-border);
            border-radius: 32px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: var(--jcc-shadow);
            z-index: 1;
        }

        /* Developer touch: Noise overlay for realistic glass */
        .jcc-maintenance-wrapper::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 32px;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: -1;
        }

        .brand-logo {
            height: 85px;
            margin-bottom: 24px;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.05));
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.5);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 11px;
            letter-spacing: 1px;
            font-weight: 800;
            color: var(--jcc-green);
            text-transform: uppercase;
            margin-bottom: 20px;
            border: 1px solid var(--jcc-border);
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: var(--jcc-green);
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.4);
            animation: pulse 2s infinite;
        }

        h1 {
            color: var(--jcc-emerald);
            font-size: 1.75rem;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .desc {
            color: #4a635e;
            line-height: 1.5;
            font-size: 1rem;
            margin-bottom: 32px;
            padding: 0 10px;
        }

        /* Modern Grid Timer */
        .jcc-timer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 32px;
        }

        .unit-box {
            background: rgba(255, 255, 255, 0.6);
            padding: 16px 10px;
            border-radius: 18px;
            border: 1px solid var(--jcc-border);
        }

        .val {
            display: block;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--jcc-emerald);
            font-variant-numeric: tabular-nums;
        }

        .lbl {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            color: #728c87;
        }

        .launch-eta {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--jcc-emerald);
            opacity: 0.8;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(46, 125, 50, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 125, 50, 0); }
        }

        @media (max-width: 400px) {
            .jcc-maintenance-wrapper { padding: 40px 20px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <main class="jcc-maintenance-wrapper">
        <img src="https://i.ibb.co.com/cKhJ7Sbv/1000032566-removebg-preview.png" alt="Janani" class="brand-logo">
        
        <div class="status-pill">
            <span class="pulse-dot"></span>
            Under Optimization
        </div>

        <h1>Development Mode</h1>
        <p class="desc">The student portal is currently undergoing scheduled backend upgrades. We'll be back online for tonight's session.</p>

        <div class="jcc-timer-grid">
            <div class="unit-box">
                <span class="val" id="h">00</span>
                <span class="lbl">Hours</span>
            </div>
            <div class="unit-box">
                <span class="val" id="m">00</span>
                <span class="lbl">Mins</span>
            </div>
            <div class="unit-box">
                <span class="val" id="s">00</span>
                <span class="lbl">Secs</span>
            </div>
        </div>

        <div class="launch-eta">
            Return Expected: Today @ 20:30 BST
        </div>
    </main>

    <script>
        const update = () => {
            const tgt = new Date();
            tgt.setHours(20, 30, 0, 0);

            const gap = tgt - new Date();
            const d = gap > 0 ? gap : 0;

            const h = Math.floor((d / 36e5) % 24);
            const m = Math.floor((d / 6e4) % 60);
            const s = Math.floor((d / 1e3) % 60);

            document.getElementById('h').innerText = h.toString().padStart(2, '0');
            document.getElementById('m').innerText = m.toString().padStart(2, '0');
            document.getElementById('s').innerText = s.toString().padStart(2, '0');
        };

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
